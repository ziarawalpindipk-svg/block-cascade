<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.35;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 130;
            const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 196;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.06;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let player = { x: 0, y: 0, r: 10, vx: 0, vy: 0 };
    let ropes = [];
    let activeRope = null;
    let distance = 0;
    let lives = 3;
    let gameRunning = false;
    let isAttached = false;
    let cameraX = 0;
    let frame = 0;
    let speed = 2;
    let milestoneShown = 0;

    const GRAVITY = 0.5;

    function initGame() {
        player.x = 50;
        player.y = H/2;
        player.vx = 2;
        player.vy = 0;
        ropes = [];
        activeRope = null;
        distance = 0;
        lives = 3;
        gameRunning = true;
        isAttached = false;
        cameraX = 0;
        frame = 0;
        speed = 2;
        milestoneShown = 0;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = 'Distance: 0';
        livesEl.innerText = '❤️ 3';
        generateRopes();
    }

    function generateRopes() {
        let lastX = ropes.length > 0 ? ropes[ropes.length-1].x : 100;
        for(let i=0; i<5; i++) {
            let x = lastX + 150 + Math.random() * 100;
            let y = 100 + Math.random() * (H - 200);
            ropes.push({ x, y, radius: 6 });
            lastX = x;
        }
    }

    function handleTap(e) {
        if(!gameRunning) return;
        let nearest = null;
        let nearestDist = Infinity;
        for(let r of ropes) {
            let dx = r.x - (player.x + cameraX);
            let dy = r.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 200 && dist < nearestDist) { nearestDist = dist; nearest = r; }
        }
        if(nearest) {
            activeRope = nearest;
            isAttached = true;
            player.vx = 0;
            player.vy = 0;
            SFX.tone(500, 0.08, 'sine', 0.2, 700);
        } else {
            if(isAttached) SFX.tone(600, 0.06, 'sine', 0.18, 900);
            isAttached = false;
            activeRope = null;
        }
    }

    canvas.addEventListener('mousedown', handleTap);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); }, { passive: false });

    function update() {
        if(!gameRunning) return;
        frame++;

        if(isAttached && activeRope) {
            let dx = activeRope.x - (player.x + cameraX);
            let dy = activeRope.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 0) {
                let angle = Math.atan2(dy, dx);
                let force = dist / 200;
                player.vx += force * Math.cos(angle);
                player.vy += force * Math.sin(angle);
            }
        } else {
            player.vy += GRAVITY;
        }

        player.x += player.vx;
        player.y += player.vy;

        if(player.y + player.r > H) {
            lives--;
            livesEl.innerText = '❤️ ' + lives;
            SFX.tone(180, 0.3, 'sawtooth', 0.3, 60);
            if(lives <= 0) {
                gameRunning = false;
                SFX.noiseThud(0.3, 0.3);
                finalMsg.innerText = Math.floor(distance);
                gameOverDiv.style.display = 'block';
                return;
            }
            player.y = 100;
            player.vy = 0;
            if(isAttached) { isAttached = false; activeRope = null; }
        }
        if(player.y - player.r < 0) player.y = player.r;

        cameraX += speed;
        distance += speed;
        scoreEl.innerText = 'Distance: ' + Math.floor(distance);

        if(Math.floor(distance/500) > milestoneShown) {
            milestoneShown = Math.floor(distance/500);
            SFX.tone(600, 0.1, 'sine', 0.25, 1000);
            speed += 0.3;
        }

        if(ropes.length > 0 && ropes[ropes.length-1].x < cameraX + W + 100) generateRopes();
        while(ropes.length > 0 && ropes[0].x < cameraX - 100) ropes.shift();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f3460');
        grad.addColorStop(0.5, '#1a5276');
        grad.addColorStop(1, '#0f3460');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        for(let r of ropes) {
            let sx = r.x - cameraX;
            ctx.beginPath();
            ctx.arc(sx, r.y, r.radius, 0, Math.PI*2);
            ctx.fillStyle = '#b2bec3';
            ctx.shadowColor = '#b2bec3';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(sx, r.y, r.radius/2, 0, Math.PI*2);
            ctx.fillStyle = '#dfe6e9';
            ctx.fill();
        }

        if(isAttached && activeRope) {
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(activeRope.x - cameraX, activeRope.y);
            ctx.lineTo(player.x, player.y);
            ctx.stroke();
        }

        let px = player.x;
        let py = player.y;

        ctx.fillStyle = '#f1c40f';
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(px, py - 5, player.r, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px, py - 20, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(px + 3, py - 22, 3, 0, Math.PI*2);
        ctx.arc(px - 3, py - 22, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#0f3460';
        ctx.beginPath();
        ctx.arc(px + 4, py - 22, 1.5, 0, Math.PI*2);
        ctx.arc(px - 2, py - 22, 1.5, 0, Math.PI*2);
        ctx.fill();

        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        let angle = Date.now() * 0.005;
        if(isAttached) {
            ctx.beginPath();
            ctx.moveTo(px, py - 5);
            ctx.lineTo(px + 15 * Math.cos(angle), py + 10 * Math.sin(angle));
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(px, py - 5);
            ctx.lineTo(px - 15 * Math.cos(angle), py + 10 * Math.sin(angle));
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.moveTo(px, py - 5);
            ctx.lineTo(px + 15, py + 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(px, py - 5);
            ctx.lineTo(px - 15, py + 10);
            ctx.stroke();
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
