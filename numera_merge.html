<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

<!-- ============================================================

<script src="https://pl30278087.effectivecpmnetwork.com/4b/ea/3a/4bea3a1f3fa20c58d7897594c829d53d.js"></script>

<style>
  :root{
    --bg1:#2a1045; --bg2:#0f0620;
    --panel:#241238; --panel-line:rgba(255,255,255,0.08);
    --text:#f4eefc; --sub:#b09cd0;
    --accent:#a855f7; --accent2:#7c3aed;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{
    margin:0; padding:0;
    background: radial-gradient(circle at 30% 0%, var(--bg1), var(--bg2));
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden;
  }
  #app{
    max-width:420px; margin:0 auto;
    padding:12px 12px calc(20px + env(safe-area-inset-bottom,0px));
    display:flex; flex-direction:column; align-items:center;
  }
  .top-row{ width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .back-btn{
    background: rgba(255,255,255,0.08); border:none; border-radius:10px;
    color: var(--text); font-size:14px; font-weight:600; padding:8px 14px;
    text-decoration:none; cursor:pointer;
  }
  .title{
    font-family:'Baloo 2',sans-serif; font-size:20px; font-weight:800;
    background: linear-gradient(90deg, var(--accent), #ec4899);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .score-row{ display:flex; gap:8px; }
  .score-box{
    background: var(--panel); border:1px solid var(--panel-line);
    border-radius:10px; padding:5px 12px; text-align:center; min-width:56px;
  }
  .score-box .label{ font-size:9px; color:var(--sub); text-transform:uppercase; }
  .score-box .value{ font-size:16px; font-weight:700; }

  #ad-banner{ width:100%; max-width:360px; min-height:50px; margin-bottom:10px; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.04); }

  #board-wrap{
    background: var(--panel);
    border-radius:16px; padding:8px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4), inset 0 0 0 1px var(--panel-line);
    width: min(90vw, 46vh, 360px);
    height: min(90vw, 46vh, 360px);
    touch-action: none;
    position: relative;
  }
  #board{
    display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr);
    gap:8px; width:100%; height:100%;
  }
  .cell-bg{ background: rgba(255,255,255,0.05); border-radius:8px; }
  .tile{
    position:absolute; display:flex; align-items:center; justify-content:center;
    border-radius:8px; font-weight:800; font-family:'Baloo 2',sans-serif;
    transition: left 0.12s ease, top 0.12s ease, transform 0.12s ease;
    color:#1a0a2e;
  }
  .hint{ margin-top:10px; font-size:11px; color:var(--sub); text-align:center; }

  #overlay{
    position:fixed; inset:0; background:rgba(10,4,20,0.9);
    display:none; align-items:center; justify-content:center; z-index:1000;
  }
  #overlay.show{ display:flex; }
  .modal{
    background: linear-gradient(180deg, #2a1045, #120720);
    border-radius:18px; padding:26px 24px; text-align:center;
    width:82%; max-width:320px; border:1px solid rgba(255,255,255,0.08);
  }
  .modal h2{ margin:0 0 6px; font-family:'Baloo 2',sans-serif; font-size:24px; }
  .modal p{ color:var(--sub); margin:0 0 6px; font-size:13px; }
  #ad-gameover{ width:100%; max-width:280px; min-height:90px; margin:10px auto; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.04); }
  button.primary{
    background: linear-gradient(135deg, var(--accent), #ec4899);
    border:none; color:#1a0a2e; font-weight:700; font-size:15px;
    padding:12px 20px; border-radius:14px; width:100%; margin-top:6px; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div class="top-row">
    <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" class="back-btn">← Back</a>
    <div class="title">Numera Merge</div>
    <div class="score-row">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </div>

  <!-- ============================================================
       🔹 ADSTERRA BANNER 320x50
       ============================================================ -->
  <div id="ad-banner">
    <script>
      atOptions = { 'key':'63f9cc601bd826eb8fbdc16d61a1bf4b', 'format':'iframe', 'height':50, 'width':320, 'params':{} };
    </script>
    <script src="https://www.highperformanceformat.com/63f9cc601bd826eb8fbdc16d61a1bf4b/invoke.js"></script>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>
  <div class="hint">Swipe up, down, left, or right to slide tiles. Merge equal numbers!</div>
</div>

<div id="overlay">
  <div class="modal">
    <h2>Game Over</h2>
    <p id="final-score">Score: 0</p>
    <div id="ad-gameover">
      <script async="async" data-cfasync="false" src="https://pl30278109.effectivecpmnetwork.com/37bcd87f9b90a477e2b211daed1f289b/invoke.js"></script>
      <div id="container-37bcd87f9b90a477e2b211daed1f289b"></div>
    </div>
    <button class="primary" id="restartBtn">Play Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const SIZE = 4;
  const boardEl = document.getElementById('board');
  const boardWrap = document.getElementById('board-wrap');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('final-score');

  let grid = [];
  let score = 0;
  let best = parseInt(localStorage.getItem('numera_best') || '0', 10);
  bestEl.textContent = best;

  const TILE_COLORS = {
    2:'#f3e8ff', 4:'#e9d5ff', 8:'#d8b4fe', 16:'#c084fc',
    32:'#a855f7', 64:'#9333ea', 128:'#7c3aed', 256:'#6d28d9',
    512:'#5b21b6', 1024:'#4c1d95', 2048:'#ec4899'
  };

  function newGrid(){
    grid = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
    addRandomTile();
    addRandomTile();
  }
  function addRandomTile(){
    const empty = [];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) empty.push([r,c]);
    if(empty.length === 0) return;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function render(){
    boardEl.innerHTML = '';
    // background cells
    for(let i=0;i<SIZE*SIZE;i++){
      const bg = document.createElement('div');
      bg.className = 'cell-bg';
      boardEl.appendChild(bg);
    }
    const rect = boardEl.getBoundingClientRect();
    const cellSize = (rect.width - 8*3) / 4; // gap 8px, 3 gaps between 4 cols
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const val = grid[r][c];
        if(!val) continue;
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = val;
        tile.style.width = cellSize + 'px';
        tile.style.height = cellSize + 'px';
        tile.style.left = (c * (cellSize + 8)) + 'px';
        tile.style.top = (r * (cellSize + 8)) + 'px';
        tile.style.background = TILE_COLORS[val] || '#f472b6';
        tile.style.fontSize = (val > 512 ? cellSize*0.28 : cellSize*0.36) + 'px';
        if (val > 4) tile.style.color = '#fff';
        boardEl.appendChild(tile);
      }
    }
    scoreEl.textContent = score;
  }

  function slideRowLeft(row){
    const filtered = row.filter(v => v !== 0);
    const merged = [];
    let gained = 0;
    for(let i=0;i<filtered.length;i++){
      if(filtered[i] === filtered[i+1]){
        const val = filtered[i]*2;
        merged.push(val);
        gained += val;
        i++;
      } else {
        merged.push(filtered[i]);
      }
    }
    while(merged.length < SIZE) merged.push(0);
    return { row: merged, gained, moved: JSON.stringify(row) !== JSON.stringify(merged) };
  }

  function rotateGridCW(g){
    const n = g.length;
    const res = Array.from({length:n}, () => Array(n).fill(0));
    for(let r=0;r<n;r++) for(let c=0;c<n;c++) res[c][n-1-r] = g[r][c];
    return res;
  }

  function move(direction){
    // Normalize to "left" by rotating, then rotate back
    let rotations = 0;
    if(direction === 'up') rotations = 3;
    else if(direction === 'right') rotations = 2;
    else if(direction === 'down') rotations = 1;

    let g = grid;
    for(let i=0;i<rotations;i++) g = rotateGridCW(g);

    let anyMoved = false;
    let totalGain = 0;
    const newG = g.map(row => {
      const { row: newRow, gained, moved } = slideRowLeft(row);
      if(moved) anyMoved = true;
      totalGain += gained;
      return newRow;
    });

    let result = newG;
    const backRotations = (4 - rotations) % 4;
    for(let i=0;i<backRotations;i++) result = rotateGridCW(result);

    if(anyMoved){
      grid = result;
      score += totalGain;
      if(score > best){ best = score; localStorage.setItem('numera_best', best); bestEl.textContent = best; }
      addRandomTile();
      render();
      if(isGameOver()) endGame();
    }
  }

  function isGameOver(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) return false;
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const v = grid[r][c];
        if(c < SIZE-1 && grid[r][c+1] === v) return false;
        if(r < SIZE-1 && grid[r+1][c] === v) return false;
      }
    }
    return true;
  }

  function endGame(){
    finalScoreEl.textContent = 'Score: ' + score;
    overlay.classList.add('show');
  }

  function startGame(){
    score = 0;
    overlay.classList.remove('show');
    newGrid();
    render();
  }

  // ---------------- Touch / Swipe controls ----------------
  let touchStartX = 0, touchStartY = 0;
  boardWrap.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
  }, {passive:true});
  boardWrap.addEventListener('touchend', (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absX = Math.abs(dx), absY = Math.abs(dy);
    if(Math.max(absX, absY) < 24) return; // too small, ignore
    if(absX > absY){
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  }, {passive:true});
  boardWrap.addEventListener('touchmove', (e) => { e.preventDefault(); }, {passive:false});

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') move('left');
    else if(e.key === 'ArrowRight') move('right');
    else if(e.key === 'ArrowUp') move('up');
    else if(e.key === 'ArrowDown') move('down');
  });

  document.getElementById('restartBtn').addEventListener('click', startGame);
  window.addEventListener('resize', render);

  startGame();
})();
</script>
</body>
</html>
