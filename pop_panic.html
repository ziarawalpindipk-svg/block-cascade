<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pop Panic - Fast Reaction Tap Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#3d0f14; --bg2:#160507;
    --panel:#2a0d10; --panel-line:rgba(255,255,255,0.08);
    --text:#fdeeee; --sub:#d99a9e;
    --accent:#ef4444; --accent2:#f87171;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{
    margin:0; padding:0;
    background: radial-gradient(circle at 30% 0%, var(--bg1), var(--bg2));
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden;
  }
  #app{
    max-width:420px; margin:0 auto;
    padding:12px 12px calc(20px + env(safe-area-inset-bottom,0px));
    display:flex; flex-direction:column; align-items:center;
  }
  .top-row{ width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .back-btn{
    background: rgba(255,255,255,0.08); border:none; border-radius:10px;
    color: var(--text); font-size:14px; font-weight:600; padding:8px 14px;
    text-decoration:none; cursor:pointer;
  }
  .title{
    font-family:'Baloo 2',sans-serif; font-size:19px; font-weight:800;
    background: linear-gradient(90deg, var(--accent), #fb923c);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .stat-row{ display:flex; gap:8px; }
  .score-box{
    background: var(--panel); border:1px solid var(--panel-line);
    border-radius:10px; padding:5px 12px; text-align:center; min-width:52px;
  }
  .score-box .label{ font-size:9px; color:var(--sub); text-transform:uppercase; }
  .score-box .value{ font-size:16px; font-weight:700; }

  #ad-banner{ width:100%; max-width:360px; min-height:50px; margin-bottom:10px; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.04); }

  #board{
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    gap:10px;
    width: min(90vw, 46vh, 320px);
    height: min(90vw, 46vh, 320px);
    margin-top: 6px;
  }
  .hole{
    background: var(--panel);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:34px;
    box-shadow: inset 0 6px 14px rgba(0,0,0,0.5);
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .hole .mole{
    transform: translateY(60px) scale(0.6);
    transition: transform 0.15s ease-out;
    opacity:0;
  }
  .hole.up .mole{ transform: translateY(0) scale(1); opacity:1; }
  .hole.hit .mole{ animation: hitPop 0.2s ease forwards; }
  @keyframes hitPop{ 0%{transform:scale(1);} 50%{transform:scale(1.4);} 100%{transform:scale(0);opacity:0;} }

  .hint{ margin-top:12px; font-size:11px; color:var(--sub); text-align:center; }

  #overlay{
    position:fixed; inset:0; background:rgba(15,4,5,0.9);
    display:none; align-items:center; justify-content:center; z-index:1000;
  }
  #overlay.show{ display:flex; }
  .modal{
    background: linear-gradient(180deg, #3d0f14, #150506);
    border-radius:18px; padding:26px 24px; text-align:center;
    width:82%; max-width:320px; border:1px solid rgba(255,255,255,0.08);
  }
  .modal h2{ margin:0 0 6px; font-family:'Baloo 2',sans-serif; font-size:24px; }
  .modal p{ color:var(--sub); margin:0 0 6px; font-size:13px; }
  #ad-gameover{ width:100%; max-width:280px; min-height:90px; margin:10px auto; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.04); }
  button.primary{
    background: linear-gradient(135deg, var(--accent), #fb923c);
    border:none; color:#2a0506; font-weight:700; font-size:15px;
    padding:12px 20px; border-radius:14px; width:100%; margin-top:6px; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div class="top-row">
    <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" class="back-btn">← Back</a>
    <div class="title">Pop Panic</div>
    <div class="stat-row">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Time</div><div class="value" id="timer">30</div></div>
    </div>
  </div>

  <!-- ============================================================
       🔹 ADSTERRA BANNER 320x50
       ============================================================ -->
  <div id="ad-banner">
    <script>
      atOptions = { 'key':'63f9cc601bd826eb8fbdc16d61a1bf4b', 'format':'iframe', 'height':50, 'width':320, 'params':{} };
    </script>
    <script src="https://www.highperformanceformat.com/63f9cc601bd826eb8fbdc16d61a1bf4b/invoke.js"></script>
  </div>

  <div id="board"></div>
  <div class="hint">Tap the mole as soon as it pops up. Fast fingers win!</div>
</div>

<div id="overlay">
  <div class="modal">
    <h2>Time's Up!</h2>
    <p id="final-score">Score: 0</p>
    <div id="ad-gameover">
      <script async="async" data-cfasync="false" src="https://pl30278109.effectivecpmnetwork.com/37bcd87f9b90a477e2b211daed1f289b/invoke.js"></script>
      <div id="container-37bcd87f9b90a477e2b211daed1f289b"></div>
    </div>
    <button class="primary" id="restartBtn">Play Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const GRID = 9;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const timerEl = document.getElementById('timer');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('final-score');

  let holes = [];
  let score = 0;
  let timeLeft = 30;
  let gameTimer = null;
  let spawnTimer = null;
  let activeHole = -1;
  let running = false;

  function buildBoard(){
    boardEl.innerHTML = '';
    holes = [];
    for(let i=0;i<GRID;i++){
      const hole = document.createElement('div');
      hole.className = 'hole';
      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.textContent = '🐹';
      hole.appendChild(mole);
      hole.addEventListener('click', () => hitHole(i));
      boardEl.appendChild(hole);
      holes.push(hole);
    }
  }

  function hitHole(i){
    if(!running) return;
    if(i !== activeHole) return;
    holes[i].classList.add('hit');
    holes[i].classList.remove('up');
    score += 10;
    scoreEl.textContent = score;
    activeHole = -1;
    setTimeout(() => holes[i].classList.remove('hit'), 200);
  }

  function popRandomMole(){
    if(!running) return;
    if(activeHole !== -1) holes[activeHole].classList.remove('up');
    activeHole = Math.floor(Math.random() * GRID);
    holes[activeHole].classList.add('up');
    const upDuration = Math.max(450, 900 - score * 3); // gets faster as score grows
    spawnTimer = setTimeout(() => {
      if(activeHole !== -1) holes[activeHole].classList.remove('up');
      activeHole = -1;
      popRandomMole();
    }, upDuration);
  }

  function tick(){
    timeLeft--;
    timerEl.textContent = timeLeft;
    if(timeLeft <= 0) endGame();
  }

  function endGame(){
    running = false;
    clearInterval(gameTimer);
    clearTimeout(spawnTimer);
    finalScoreEl.textContent = 'Score: ' + score;
    overlay.classList.add('show');
  }

  function startGame(){
    score = 0; timeLeft = 30; running = true;
    scoreEl.textContent = 0; timerEl.textContent = 30;
    overlay.classList.remove('show');
    buildBoard();
    clearInterval(gameTimer);
    clearTimeout(spawnTimer);
    gameTimer = setInterval(tick, 1000);
    popRandomMole();
  }

  document.getElementById('restartBtn').addEventListener('click', startGame);
  startGame();
})();
</script>
</body>
</html>
