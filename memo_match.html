<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Memo Match - Memory Card Matching Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#3d3308; --bg2:#171202;
    --panel:#2b2506; --panel-line:rgba(255,255,255,0.08);
    --text:#fdf9e8; --sub:#d6c366;
    --accent:#eab308; --accent2:#facc15;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{
    margin:0; padding:0;
    background: radial-gradient(circle at 30% 0%, var(--bg1), var(--bg2));
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden;
  }
  #app{
    max-width:420px; margin:0 auto;
    padding:12px 12px calc(20px + env(safe-area-inset-bottom,0px));
    display:flex; flex-direction:column; align-items:center;
  }
  .top-row{ width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .back-btn{
    background: rgba(255,255,255,0.08); border:none; border-radius:10px;
    color: var(--text); font-size:14px; font-weight:600; padding:8px 14px;
    text-decoration:none; cursor:pointer;
  }
  .title{
    font-family:'Baloo 2',sans-serif; font-size:19px; font-weight:800;
    background: linear-gradient(90deg, var(--accent), #fef08a);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .score-box{
    background: var(--panel); border:1px solid var(--panel-line);
    border-radius:10px; padding:5px 12px; text-align:center; min-width:56px;
  }
  .score-box .label{ font-size:9px; color:var(--sub); text-transform:uppercase; }
  .score-box .value{ font-size:16px; font-weight:700; }

  #ad-banner{ width:100%; max-width:360px; min-height:50px; margin-bottom:10px; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.04); }

  #board{
    display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr);
    gap:8px;
    width: min(90vw, 50vh, 340px);
    height: min(90vw, 50vh, 340px);
  }
  .card{
    position:relative;
    border-radius:10px;
    cursor:pointer;
    perspective: 600px;
  }
  .card-inner{
    width:100%; height:100%;
    position:relative;
    transform-style: preserve-3d;
    transition: transform 0.35s;
  }
  .card.flipped .card-inner{ transform: rotateY(180deg); }
  .card-face{
    position:absolute; inset:0;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    backface-visibility:hidden;
  }
  .card-back{ background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .card-front{ background: var(--panel); transform: rotateY(180deg); }
  .card.matched .card-front{ background: rgba(234,179,8,0.25); }

  .hint{ margin-top:12px; font-size:11px; color:var(--sub); text-align:center; }

  #overlay{
    position:fixed; inset:0; background:rgba(20,16,3,0.9);
    display:none; align-items:center; justify-content:center; z-index:1000;
  }
  #overlay.show{ display:flex; }
  .modal{
    background: linear-gradient(180deg, #3d3308, #161102);
    border-radius:18px; padding:26px 24px; text-align:center;
    width:82%; max-width:320px; border:1px solid rgba(255,255,255,0.08);
  }
  .modal h2{ margin:0 0 6px; font-family:'Baloo 2',sans-serif; font-size:24px; }
  .modal p{ color:var(--sub); margin:0 0 6px; font-size:13px; }
  #ad-gameover{ width:100%; max-width:280px; min-height:90px; margin:10px auto; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.04); }
  button.primary{
    background: linear-gradient(135deg, var(--accent), #fef08a);
    border:none; color:#241d02; font-weight:700; font-size:15px;
    padding:12px 20px; border-radius:14px; width:100%; margin-top:6px; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div class="top-row">
    <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" class="back-btn">← Back</a>
    <div class="title">Memo Match</div>
    <div class="score-box"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
  </div>

  <!-- ============================================================
       🔹 ADSTERRA BANNER 320x50
       ============================================================ -->
  <div id="ad-banner">
    <script>
      atOptions = { 'key':'63f9cc601bd826eb8fbdc16d61a1bf4b', 'format':'iframe', 'height':50, 'width':320, 'params':{} };
    </script>
    <script async src="https://www.highperformanceformat.com/63f9cc601bd826eb8fbdc16d61a1bf4b/invoke.js"></script>
  </div>

  <div id="board"></div>
  <div class="hint">Flip two cards. If they match, they stay revealed!</div>
</div>

<div id="overlay">
  <div class="modal">
    <h2>You Win! 🎉</h2>
    <p id="final-score">Moves: 0</p>
    <div id="ad-gameover">
      <script async="async" data-cfasync="false" src="https://pl30278109.effectivecpmnetwork.com/37bcd87f9b90a477e2b211daed1f289b/invoke.js"></script>
      <div id="container-37bcd87f9b90a477e2b211daed1f289b"></div>
    </div>
    <button class="primary" id="restartBtn">Play Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------- Sound Manager (added: was completely missing) ---------- */
  const SFX = (() => {
    let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
    let started = false;
    function init() {
      if (ctx) return;
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.8;
      masterGain.connect(ctx.destination);
      musicGain = ctx.createGain();
      musicGain.gain.value = 0.3;
      musicGain.connect(masterGain);
    }
    function tone(freq, dur, type, vol, glideTo) {
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
      g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(g); g.connect(masterGain);
      osc.start(); osc.stop(ctx.currentTime + dur);
    }
    function startMusic() {
      if (!ctx || musicNodes) return;
      const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
      const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
      const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
      lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
      o1.connect(musicGain); o2.connect(musicGain);
      o1.start(); o2.start(); lfo.start();
      musicNodes = [o1, o2, lfo];
    }
    function ensureStarted() {
      if (started) return;
      started = true;
      init();
      startMusic();
    }
    return { ensureStarted, tone };
  })();
  const EMOJIS = ['🍎','🍋','🍇','🍉','🍓','🍒','🍑','🥝'];
  const boardEl = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('final-score');

  let cards = [];
  let flipped = [];
  let matchedCount = 0;
  let moves = 0;
  let busy = false;

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildBoard(){
    const deck = shuffle([...EMOJIS, ...EMOJIS]);
    boardEl.innerHTML = '';
    cards = [];
    deck.forEach((emoji, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.idx = idx;
      card.dataset.emoji = emoji;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back">❓</div>
          <div class="card-face card-front">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => onCardClick(card));
      boardEl.appendChild(card);
      cards.push(card);
    });
  }

  function onCardClick(card){
    SFX.ensureStarted();
    if(busy) return;
    if(card.classList.contains('flipped') || card.classList.contains('matched')) return;
    if(flipped.length === 2) return;

    card.classList.add('flipped');
    flipped.push(card);
    SFX.tone(400, 0.08, 'sine', 0.25, 550);

    if(flipped.length === 2){
      moves++;
      movesEl.textContent = moves;
      const [a, b] = flipped;
      if(a.dataset.emoji === b.dataset.emoji){
        a.classList.add('matched');
        b.classList.add('matched');
        matchedCount += 2;
        flipped = [];
        SFX.tone(600, 0.12, 'sine', 0.3, 900);
        if(matchedCount === cards.length) setTimeout(endGame, 400);
      } else {
        busy = true;
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          busy = false;
          SFX.tone(200, 0.15, 'square', 0.2, 130);
        }, 700);
      }
    }
  }

  function endGame(){
    finalScoreEl.textContent = 'Moves: ' + moves;
    overlay.classList.add('show');
    SFX.tone(500, 0.15, 'triangle', 0.3, 700);
  }

  function startGame(){
    moves = 0; matchedCount = 0; flipped = []; busy = false;
    movesEl.textContent = 0;
    overlay.classList.remove('show');
    buildBoard();
  }

  document.getElementById('restartBtn').addEventListener('click', startGame);
  startGame();
})();
</script>
</body>
</html>
