</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.11;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let player = { x: 0, y: 0, r: 8 };
    let trail = [];
    let enemies = [];
    let score = 0;
    let gameRunning = false;
    let frame = 0;
    let speed = 3;
    let lastPercent = 0;

    const GRID_SIZE = 20;
    let cols, rows, map = [];

    function initGame() {
        cols = Math.floor(W / GRID_SIZE);
        rows = Math.floor(H / GRID_SIZE);
        player.x = W/2;
        player.y = H/2;
        trail = [];
        enemies = [];
        score = 0;
        lastPercent = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = 'Area: 0%';
        frame = 0;
        speed = 3;

        map = [];
        for(let r=0; r<rows; r++) { map[r] = []; for(let c=0; c<cols; c++) map[r][c] = false; }

        for(let i=0; i<5; i++) spawnEnemy();
    }

    function spawnEnemy() {
        let x, y;
        do {
            x = 50 + Math.random() * (W - 100);
            y = 50 + Math.random() * (H - 100);
        } while(Math.abs(x - player.x) < 100 && Math.abs(y - player.y) < 100);
        enemies.push({ x, y, r: 6 + Math.random() * 8, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, color: '#ff6b6b' });
    }

    function handleMove(e) {
        if(!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        let mx = clientX - rect.left;
        let my = clientY - rect.top;

        let dx = mx - player.x;
        let dy = my - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > 5) {
            player.x += (dx/dist) * speed;
            player.y += (dy/dist) * speed;
        }
        player.x = Math.max(player.r, Math.min(W - player.r, player.x));
        player.y = Math.max(player.r, Math.min(H - player.r, player.y));
    }

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, { passive: false });

    function update() {
        if(!gameRunning) return;
        frame++;

        trail.push({x: player.x, y: player.y});
        if(trail.length > 30) trail.shift();

        let col = Math.floor(player.x / GRID_SIZE);
        let row = Math.floor(player.y / GRID_SIZE);
        if(col >= 0 && col < cols && row >= 0 && row < rows) {
            if(!map[row][col]) {
                map[row][col] = true;
                score++;
                let percent = Math.floor((score / (cols*rows)) * 100);
                scoreEl.innerText = 'Area: ' + percent + '%';
                if(percent > lastPercent && percent % 10 === 0) {
                    SFX.tone(500 + percent*3, 0.08, 'sine', 0.2, 800);
                    lastPercent = percent;
                }
            }
        }

        for(let e of enemies) {
            e.x += e.vx; e.y += e.vy;
            if(e.x < e.r || e.x > W - e.r) { e.vx = -e.vx; e.x = Math.max(e.r, Math.min(W - e.r, e.x)); }
            if(e.y < e.r || e.y > H - e.r) { e.vy = -e.vy; e.y = Math.max(e.r, Math.min(H - e.r, e.y)); }

            let dx = player.x - e.x, dy = player.y - e.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < player.r + e.r) {
                gameRunning = false;
                SFX.noiseThud(0.3, 0.3);
                finalMsg.innerText = Math.floor((score / (cols*rows)) * 100) + '%';
                gameOverDiv.style.display = 'block';
                return;
            }
        }

        if(frame % 120 === 0 && enemies.length < 8) spawnEnemy();
        speed = 3 + Math.floor(score / 20);
    }

    function draw() {
        if(map.length === 0) return;
        ctx.clearRect(0, 0, W, H);

        ctx.fillStyle = '#2d3436';
        ctx.fillRect(0, 0, W, H);

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                if(map[r][c]) {
                    ctx.fillStyle = '#4facfe';
                    ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                }
            }
        }

        for(let i=0; i<trail.length; i++) {
            let alpha = i / trail.length * 0.5;
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, player.r * (i/trail.length), 0, Math.PI*2);
            ctx.fillStyle = `rgba(79, 172, 254, ${alpha})`;
            ctx.fill();
        }

        for(let e of enemies) {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = e.color;
            ctx.shadowColor = e.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(e.x - 3, e.y - 2, 2, 0, Math.PI*2);
            ctx.arc(e.x + 3, e.y - 2, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(e.x - 3, e.y - 2, 1, 0, Math.PI*2);
            ctx.arc(e.x + 3, e.y - 2, 1, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = '#f1c40f';
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(player.x - 3, player.y - 2, 3, 0, Math.PI*2);
        ctx.arc(player.x + 3, player.y - 2, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(player.x - 3, player.y - 2, 1.5, 0, Math.PI*2);
        ctx.arc(player.x + 3, player.y - 2, 1.5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Move to paint the area. Avoid red enemies!', W/2, H - 20);
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
