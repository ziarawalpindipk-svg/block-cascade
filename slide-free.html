        #introOverlay { position: absolute; inset: 0; background: rgba(10,10,20,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; pointer-events: auto; z-index: 20; }
        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #2ed573 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,30,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(46,213,115,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        #gameOverAd { width: 260px; height: 60px; margin: 16px auto 0; background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.25); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #777; font-size: 11px; overflow: hidden; }
        #restartBtn { background: linear-gradient(135deg, #2ed573 0%, #4facfe 100%); border: none; padding: 13px 34px; font-size: 16px; color: #1a1a2e; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(46,213,115,0.4); }

        #ad-social-top { position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; background: transparent; pointer-events: none; z-index: 10; }

<div id="gameContainer">

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.12;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const movesEl = document.getElementById('movesVal');
    const finalMovesEl = document.getElementById('finalMoves');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H, cellSize;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
        cellSize = Math.min(W, H) / 6;
    }
    resize();
    window.addEventListener('resize', resize);

    let blocks = [];
    let moves = 0;
    let gameRunning = false;
    let selectedBlock = null;
    let isDragging = false;

    const GRID_SIZE = 6;
    const EXIT_ROW = 2;
    const EXIT_COL = 5;

    function initGame() {
        blocks = [];
        moves = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        movesEl.innerText = '0';
        selectedBlock = null;
        isDragging = false;

        blocks.push({ id: 0, row: 2, col: 0, len: 2, horizontal: true, color: '#ff4757', isRed: true });
        blocks.push({ id: 1, row: 0, col: 0, len: 2, horizontal: false, color: '#4facfe' });
        blocks.push({ id: 2, row: 0, col: 2, len: 2, horizontal: true, color: '#feca57' });
        blocks.push({ id: 3, row: 0, col: 4, len: 3, horizontal: false, color: '#2ed573' });
        blocks.push({ id: 4, row: 1, col: 1, len: 2, horizontal: false, color: '#a29bfe' });
        blocks.push({ id: 5, row: 1, col: 4, len: 2, horizontal: true, color: '#fd79a8' });
        blocks.push({ id: 6, row: 3, col: 0, len: 2, horizontal: true, color: '#55efc4' });
        blocks.push({ id: 7, row: 3, col: 2, len: 3, horizontal: true, color: '#fdcb6e' });
        blocks.push({ id: 8, row: 4, col: 0, len: 2, horizontal: false, color: '#74b9ff' });
        blocks.push({ id: 9, row: 4, col: 3, len: 2, horizontal: false, color: '#e17055' });
        blocks.push({ id: 10, row: 5, col: 2, len: 2, horizontal: true, color: '#00b894' });
        blocks.push({ id: 11, row: 5, col: 4, len: 2, horizontal: true, color: '#6c5ce7' });
    }

    function getBlockCells(block) {
        let cells = [];
        for(let i=0; i<block.len; i++) {
            if(block.horizontal) cells.push({ row: block.row, col: block.col + i });
            else cells.push({ row: block.row + i, col: block.col });
        }
        return cells;
    }

    function isCellOccupied(row, col, excludeId) {
        for(let b of blocks) {
            if(b.id === excludeId) continue;
            for(let c of getBlockCells(b)) if(c.row === row && c.col === col) return true;
        }
        return false;
    }

    function canMoveBlock(block, deltaRow, deltaCol) {
        for(let c of getBlockCells(block)) {
            let newRow = c.row + deltaRow;
            let newCol = c.col + deltaCol;
            if(newRow < 0 || newRow >= GRID_SIZE || newCol < 0 || newCol >= GRID_SIZE) return false;
            if(isCellOccupied(newRow, newCol, block.id)) return false;
        }
        return true;
    }

    let dragOffsetX = 0, dragOffsetY = 0;

    function handleMouseDown(e) {
        if(!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const mx = clientX - rect.left;
        const my = clientY - rect.top;
        const offsetX = (W - GRID_SIZE * cellSize) / 2;
        const offsetY = (H - GRID_SIZE * cellSize) / 2;

        for(let i=blocks.length-1; i>=0; i--) {
            let b = blocks[i];
            for(let c of getBlockCells(b)) {
                const cx = offsetX + c.col * cellSize;
                const cy = offsetY + c.row * cellSize;
                if(mx >= cx && mx <= cx + cellSize && my >= cy && my <= cy + cellSize) {
                    selectedBlock = i;
                    dragOffsetX = mx - cx;
                    dragOffsetY = my - cy;
                    isDragging = true;
                    return;
                }
            }
        }
    }

    function handleMouseUp() {
        isDragging = false;
    }

    function handleMouseMove(e) {
        if(!isDragging || selectedBlock === null || !gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const mx = clientX - rect.left;
        const my = clientY - rect.top;
        const offsetX = (W - GRID_SIZE * cellSize) / 2;
        const offsetY = (H - GRID_SIZE * cellSize) / 2;

        let b = blocks[selectedBlock];
        let col = Math.floor((mx - offsetX) / cellSize);
        let row = Math.floor((my - offsetY) / cellSize);
        col = Math.max(0, Math.min(GRID_SIZE-1, col));
        row = Math.max(0, Math.min(GRID_SIZE-1, row));

        let deltaRow = row - b.row;
        let deltaCol = col - b.col;

        if(b.horizontal) {
            deltaRow = 0;
            if(deltaCol > 1) deltaCol = 1;
            if(deltaCol < -1) deltaCol = -1;
        } else {
            deltaCol = 0;
            if(deltaRow > 1) deltaRow = 1;
            if(deltaRow < -1) deltaRow = -1;
        }

        if((deltaRow !== 0 || deltaCol !== 0) && canMoveBlock(b, deltaRow, deltaCol)) {
            b.row += deltaRow;
            b.col += deltaCol;
            moves++;
            movesEl.innerText = moves;
            SFX.tone(350, 0.05, 'sine', 0.15, 280);

            if(b.isRed && b.row === EXIT_ROW && b.col + b.len - 1 >= EXIT_COL) {
                gameRunning = false;
                SFX.tone(500, 0.15, 'sine', 0.35, 900);
                SFX.tone(750, 0.2, 'sine', 0.35, 1200);
                finalMovesEl.innerText = moves;
                gameOverDiv.style.display = 'block';
            }
        }
    }

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleMouseDown(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMouseMove(e); }, { passive: false });
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleMouseUp(); }, { passive: false });

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#242444');
        bg.addColorStop(1, '#1a1a2e');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        const offsetX = (W - GRID_SIZE * cellSize) / 2;
        const offsetY = (H - GRID_SIZE * cellSize) / 2;

        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        for(let i=0; i<=GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(offsetX + i * cellSize, offsetY);
            ctx.lineTo(offsetX + i * cellSize, offsetY + GRID_SIZE * cellSize);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(offsetX, offsetY + i * cellSize);
            ctx.lineTo(offsetX + GRID_SIZE * cellSize, offsetY + i * cellSize);
            ctx.stroke();
        }

        ctx.fillStyle = 'rgba(46, 213, 115, 0.15)';
        ctx.fillRect(offsetX + EXIT_COL * cellSize, offsetY + EXIT_ROW * cellSize, cellSize * 1.5, cellSize);
        ctx.fillStyle = 'rgba(46, 213, 115, 0.6)';
        ctx.font = `${cellSize*0.35}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🚪', offsetX + EXIT_COL * cellSize + cellSize*0.9, offsetY + EXIT_ROW * cellSize + cellSize/2);

        for(let b of blocks) {
            for(let c of getBlockCells(b)) {
                const x = offsetX + c.col * cellSize;
                const y = offsetY + c.row * cellSize;
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = b.isRed ? 18 : 10;
                roundRect(ctx, x + 3, y + 3, cellSize - 6, cellSize - 6, 6);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
