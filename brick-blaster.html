    <style>

        #muteBtn { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 0; line-height: 1; }

        #introOverlay { position: absolute; inset: 0; background: rgba(10,10,20,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; pointer-events: auto; z-index: 20; }
        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #introOverlay p { color: #b8b8c8; font-size: 14px; margin-bottom: 22px; max-width: 300px; line-height: 1.5; }
        .how-to-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; color: #ddd; font-size: 14px; max-width: 290px; text-align: left; }
        .how-to-icon { font-size: 22px; width: 34px; text-align: center; flex-shrink: 0; }
        #startBtn { margin-top: 20px; background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); border: none; color: #0f0f23; font-weight: 700; font-size: 16px; padding: 14px 40px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(241,196,15,0.4); }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,30,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #gameOver h1 { font-size: 30px; margin-bottom: 10px; color: #ff6b6b; }

        #finalScore { color: #f1c40f; font-weight: 800; }
        #gameOverAd { width: 260px; height: 60px; margin: 14px auto 0; background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.25); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #777; font-size: 11px; }
        #restartBtn { background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); border: none; padding: 13px 34px; font-size: 16px; color: #0f0f23; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(241,196,15,0.4); }

        #ad-banner-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; color: #444; font-size: 12px; pointer-events: none; z-index: 10; }
        #ad-social-top { position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; background: transparent; pointer-events: none; z-index: 10; }

            <div class="how-to-row"><div class="how-to-icon">👆</div><div>Drag your finger to slide the paddle (mobile)</div></div>
            <div class="how-to-row"><div class="how-to-icon">🧱</div><div>Break all bricks to win the level</div></div>
            <div class="how-to-row"><div class="how-to-icon">⚠️</div><div>Don't let the ball fall past your paddle</div></div>

<div id="container-37bcd87f9b90a477e2b211daed1f289b"></div></div>

</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.11;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 98;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 147;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.09;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let paddle = { x: 0, y: 0, w: 100, h: 15 };
    let ball = { x: 0, y: 0, r: 8, dx: 4, dy: -4 };
    let trail = [];
    let bricks = [];
    let particles = [];
    let score = 0;
    let lives = 3;
    let gameRunning = false;
    let gameStarted = false;

    const brickRows = 5;
    const brickCols = 7;
    const brickW = 50;
    const brickH = 20;
    const brickPadding = 8;
    const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#a29bfe'];

    function initGame() {
        paddle.w = Math.min(W * 0.25, 120);
        paddle.x = (W - paddle.w) / 2;
        paddle.y = H - 40;

        ball.r = 8;
        resetBall();
        trail = [];
        particles = [];

        bricks = [];
        const totalBrickW = brickCols * (brickW + brickPadding) - brickPadding;
        const startX = (W - totalBrickW) / 2;
        for(let r=0; r<brickRows; r++) {
            for(let c=0; c<brickCols; c++) {
                bricks.push({ x: startX + c * (brickW + brickPadding), y: 40 + r * (brickH + brickPadding), w: brickW, h: brickH, color: colors[r % colors.length], alive: true });
            }
        }
        score = 0;
        lives = 3;
        gameRunning = true;
        gameStarted = false;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = '0';
        livesEl.innerText = '❤️ 3';
    }

    function resetBall() {
        ball.x = paddle.x + paddle.w/2;
        ball.y = paddle.y - ball.r - 2;
        ball.dx = (Math.random() > 0.5 ? 1 : -1) * 4;
        ball.dy = -4;
    }

    function spawnParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({ x, y, color, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 20 });
        }
    }

    let targetX = W/2;
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        targetX = e.clientX - rect.left;
        if(!gameStarted && gameRunning) gameStarted = true;
    });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        targetX = touch.clientX - rect.left;
        if(!gameStarted && gameRunning) gameStarted = true;
    }, { passive: false });

    function update() {
        if(!gameRunning || !gameStarted) return;

        paddle.x += (targetX - paddle.x - paddle.w/2) * 0.15;
        if(paddle.x < 0) paddle.x = 0;
        if(paddle.x + paddle.w > W) paddle.x = W - paddle.w;

        ball.x += ball.dx;
        ball.y += ball.dy;
        trail.push({x: ball.x, y: ball.y});
        if(trail.length > 8) trail.shift();

        if(ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = -ball.dx; SFX.tone(300,0.04,'square',0.15,250); }
        if(ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx = -ball.dx; SFX.tone(300,0.04,'square',0.15,250); }
        if(ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = -ball.dy; SFX.tone(300,0.04,'square',0.15,250); }

        if(ball.y + ball.r > paddle.y && ball.y + ball.r < paddle.y + paddle.h + 10 &&
           ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
            let hitPos = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
            let angle = hitPos * Math.PI/3;
            let speed = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
            ball.dx = speed * Math.sin(angle);
            ball.dy = -speed * Math.cos(angle);
            ball.y = paddle.y - ball.r;
            SFX.tone(500, 0.06, 'sine', 0.25, 700);
        }

        for(let i=0; i<bricks.length; i++) {
            let b = bricks[i];
            if(!b.alive) continue;

            if(ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
               ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                b.alive = false;
                score += 10;
                scoreEl.innerText = score;
                spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                SFX.tone(400 + Math.random()*200, 0.08, 'sine', 0.25, 700);

                let overlapLeft = ball.x - (b.x + b.w);
                let overlapRight = (b.x) - ball.x;
                let overlapTop = ball.y - (b.y + b.h);
                let overlapBottom = (b.y) - ball.y;
                let maxOverlap = Math.max(overlapLeft, overlapRight, overlapTop, overlapBottom);
                if(maxOverlap === overlapLeft || maxOverlap === overlapRight) ball.dx = -ball.dx;
                else ball.dy = -ball.dy;
                break;
            }
        }

        let allDestroyed = bricks.every(b => !b.alive);
        if(allDestroyed) {
            gameRunning = false;
            SFX.tone(500, 0.15, 'sine', 0.35, 900);
            SFX.tone(750, 0.2, 'sine', 0.35, 1200);
            finalScoreEl.innerText = 'You Won! Score: ' + score;
            gameOverDiv.style.display = 'block';
            return;
        }

        if(ball.y + ball.r > H) {
            lives--;
            livesEl.innerText = '❤️ ' + lives;
            SFX.tone(180, 0.3, 'sawtooth', 0.3, 60);
            if(lives <= 0) {
                gameRunning = false;
                SFX.noiseThud(0.3, 0.3);
                finalScoreEl.innerText = 'Score: ' + score;
                gameOverDiv.style.display = 'block';
            } else {
                resetBall();
                gameStarted = false;
            }
        }

        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#151530');
        bg.addColorStop(1, '#0f0f23');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        for(let b of bricks) {
            if(!b.alive) continue;
            ctx.fillStyle = b.color;
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 10;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }

        for(let p of particles) {
            ctx.globalAlpha = Math.max(p.life / 20, 0);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        ctx.fillStyle = '#f1c40f';
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 20;
        ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
        ctx.shadowBlur = 0;

        for(let i=0; i<trail.length; i++) {
            let alpha = (i / trail.length) * 0.3;
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, ball.r * (i/trail.length), 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 25;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
