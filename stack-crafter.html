<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.35;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 130;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 195;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let blocks = [];
    let currentBlock = null;
    let direction = 1;
    let speed = 6;
    let score = 0;
    let gameRunning = false;
    let baseY = 0;
    let blockWidth = 100;
    let blockHeight = 20;
    let colorIndex = 0;
    let particles = [];
    let cameraShiftTarget = 0, cameraShift = 0;

    const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd', '#ff9ff3', '#54a0ff', '#f368e0'];

    function initGame() {
        baseY = H - 60;
        blockWidth = Math.min(W * 0.6, 150);
        blocks = [];
        particles = [];
        cameraShift = 0; cameraShiftTarget = 0;
        blocks.push({ x: (W - blockWidth) / 2, y: baseY, w: blockWidth, h: blockHeight, color: '#576574' });
        currentBlock = {
            x: (W - blockWidth) / 2,
            y: baseY - blockHeight,
            w: blockWidth,
            h: blockHeight,
            color: colors[0]
        };
        direction = 1;
        speed = 5;
        score = 0;
        colorIndex = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = '0';
    }

    function spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push({
                x, y, color,
                vx: (Math.random()-0.5) * 6,
                vy: -Math.random()*5 - 2,
                life: 30 + Math.random()*15
            });
        }
    }

    function handleTap() {
        if(!gameRunning) return;
        if(!currentBlock) return;

        const below = blocks[blocks.length - 1];
        let overlapStart = Math.max(currentBlock.x, below.x);
        let overlapEnd = Math.min(currentBlock.x + currentBlock.w, below.x + below.w);

        if (overlapEnd <= overlapStart) {
            gameRunning = false;
            SFX.noiseThud(0.35, 0.4);
            finalScoreEl.innerText = score;
            gameOverDiv.style.display = 'block';
            return;
        }

        const newWidth = overlapEnd - overlapStart;
        const newX = overlapStart;

        if (newWidth >= blockWidth - 2) {
            score += 2;
            currentBlock.x = below.x;
            blocks.push({ x: currentBlock.x, y: currentBlock.y, w: currentBlock.w, h: blockHeight, color: currentBlock.color });
            spawnParticles(currentBlock.x + currentBlock.w/2, currentBlock.y, '#fff', 14);
            SFX.tone(700, 0.12, 'sine', 0.35, 1100);
        } else {
            score += 1;
            blocks.push({ x: newX, y: currentBlock.y, w: newWidth, h: blockHeight, color: currentBlock.color });
            SFX.tone(450, 0.1, 'sine', 0.28, 650);
            // Falling cut-off piece
            let cutX = currentBlock.x < newX ? currentBlock.x : newX + newWidth;
            let cutW = currentBlock.w - newWidth;
            if(cutW > 0) spawnParticles(cutX + cutW/2, currentBlock.y + blockHeight/2, currentBlock.color, 6);
            currentBlock.w = newWidth;
            currentBlock.x = newX;
        }

        scoreEl.innerText = score;
        colorIndex = (colorIndex + 1) % colors.length;
        blockWidth = currentBlock.w;

        if (blockWidth < 10) {
            gameRunning = false;
            SFX.noiseThud(0.3, 0.35);
            finalScoreEl.innerText = score;
            gameOverDiv.style.display = 'block';
            return;
        }

        currentBlock = {
            x: (Math.random() > 0.5) ? (W - blockWidth) : 0,
            y: currentBlock.y - blockHeight,
            w: blockWidth,
            h: blockHeight,
            color: colors[colorIndex]
        };
        speed += 0.15;

        // Shift camera up once tower gets tall, keeping active area visible
        if(currentBlock.y < H * 0.35) {
            cameraShiftTarget += blockHeight;
        }
    }

    canvas.addEventListener('mousedown', handleTap);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); }, { passive: false });

    function update() {
        if(!gameRunning || !currentBlock) return;

        currentBlock.x += direction * speed;

        if (currentBlock.x + currentBlock.w > W) {
            direction = -1;
        } else if (currentBlock.x < 0) {
            direction = 1;
        }

        cameraShift += (cameraShiftTarget - cameraShift) * 0.1;

        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f3460');
        grad.addColorStop(1, '#1a1a2e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.translate(0, cameraShift);

        for (let b of blocks) {
            ctx.fillStyle = b.color;
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 15;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }

        if (currentBlock && gameRunning) {
            ctx.fillStyle = currentBlock.color;
            ctx.shadowColor = currentBlock.color;
            ctx.shadowBlur = 25;
            ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.w, currentBlock.h);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(currentBlock.x, currentBlock.y, currentBlock.w, currentBlock.h);
        }

        for(let p of particles) {
            ctx.globalAlpha = Math.max(p.life / 40, 0);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
