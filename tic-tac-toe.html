        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #ff6b6b 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,20,40,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.1;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.07;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.04;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const turnEl = document.getElementById('turn');
    const winnerText = document.getElementById('winnerText');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H, cellSize;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
        cellSize = Math.min(W, H) / 4;
    }
    resize();
    window.addEventListener('resize', resize);

    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameRunning = false;
    let winLine = null;
    let winAnim = 0;

    const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    function initGame() {
        board = ['', '', '', '', '', '', '', '', ''];
        currentPlayer = 'X';
        gameRunning = true;
        winLine = null;
        winAnim = 0;
        gameOverDiv.style.display = 'none';
        turnEl.innerText = "Player X's Turn";
        turnEl.style.color = '#ff6b6b';
    }

    function checkWin() {
        for(let pattern of winPatterns) {
            const [a, b, c] = pattern;
            if(board[a] && board[a] === board[b] && board[a] === board[c]) return { winner: board[a], pattern };
        }
        if(board.every(cell => cell !== '')) return { winner: 'tie' };
        return null;
    }

    function handleClick(e) {
        if(!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const mx = clientX - rect.left;
        const my = clientY - rect.top;

        const offsetX = (W - cellSize * 3) / 2;
        const offsetY = (H - cellSize * 3) / 2 + 30;

        const col = Math.floor((mx - offsetX) / cellSize);
        const row = Math.floor((my - offsetY) / cellSize);
        const index = row * 3 + col;

        if(row >= 0 && row < 3 && col >= 0 && col < 3 && board[index] === '') {
            board[index] = currentPlayer;
            SFX.tone(currentPlayer === 'X' ? 450 : 550, 0.08, 'sine', 0.25, currentPlayer === 'X' ? 650 : 750);

            let result = checkWin();
            if(result) {
                gameRunning = false;
                if(result.winner === 'tie') {
                    winnerText.innerText = "IT'S A TIE!";
                    winnerText.style.color = '#f1c40f';
                    finalMsg.innerText = "Well played, both of you!";
                    SFX.tone(350, 0.3, 'sine', 0.25, 250);
                } else {
                    winLine = result.pattern;
                    winnerText.innerText = `PLAYER ${result.winner} WINS!`;
                    winnerText.style.color = result.winner === 'X' ? '#ff6b6b' : '#4facfe';
                    finalMsg.innerText = "Congratulations!";
                    turnEl.innerText = `Player ${result.winner} Wins!`;
                    turnEl.style.color = result.winner === 'X' ? '#ff6b6b' : '#4facfe';
                    SFX.tone(500, 0.15, 'sine', 0.3, 900);
                    SFX.tone(750, 0.2, 'sine', 0.3, 1200);
                    setTimeout(() => { gameOverDiv.style.display = 'block'; }, 550);
                    return;
                }
                gameOverDiv.style.display = 'block';
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            turnEl.innerText = `Player ${currentPlayer}'s Turn`;
            turnEl.style.color = currentPlayer === 'X' ? '#ff6b6b' : '#4facfe';
        }
    }

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, { passive: false });

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#242444');
        bg.addColorStop(1, '#16213e');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        const offsetX = (W - cellSize * 3) / 2;
        const offsetY = (H - cellSize * 3) / 2 + 30;

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        for(let i=1; i<3; i++) {
            ctx.beginPath();
            ctx.moveTo(offsetX + i * cellSize, offsetY);
            ctx.lineTo(offsetX + i * cellSize, offsetY + cellSize * 3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(offsetX, offsetY + i * cellSize);
            ctx.lineTo(offsetX + cellSize * 3, offsetY + i * cellSize);
            ctx.stroke();
        }

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for(let i=0; i<9; i++) {
            if(board[i] === '') continue;
            const row = Math.floor(i / 3);
            const col = i % 3;
            const x = offsetX + col * cellSize + cellSize / 2;
            const y = offsetY + row * cellSize + cellSize / 2;

            if(board[i] === 'X') {
                ctx.strokeStyle = '#ff6b6b';
                ctx.shadowColor = '#ff6b6b'; ctx.shadowBlur = 10;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                const size = cellSize * 0.35;
                ctx.beginPath();
                ctx.moveTo(x - size, y - size);
                ctx.lineTo(x + size, y + size);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x - size, y + size);
                ctx.lineTo(x + size, y - size);
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else if(board[i] === 'O') {
                ctx.strokeStyle = '#4facfe';
                ctx.shadowColor = '#4facfe'; ctx.shadowBlur = 10;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(x, y, cellSize * 0.35, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // Winning line animation
        if(winLine) {
            winAnim = Math.min(winAnim + 0.08, 1);
            const [a, , c] = winLine;
            const ar = Math.floor(a/3), ac = a%3;
            const cr = Math.floor(c/3), cc = c%3;
            const x1 = offsetX + ac * cellSize + cellSize/2;
            const y1 = offsetY + ar * cellSize + cellSize/2;
            const x2 = offsetX + cc * cellSize + cellSize/2;
            const y2 = offsetY + cr * cellSize + cellSize/2;
            const curX = x1 + (x2-x1) * winAnim;
            const curY = y1 + (y2-y1) * winAnim;
            ctx.strokeStyle = '#feca57';
            ctx.shadowColor = '#feca57'; ctx.shadowBlur = 15;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(curX, curY);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
