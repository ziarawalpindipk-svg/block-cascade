        #introOverlay h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #introOverlay p { color: #b8b8c8; font-size: 14px; margin-bottom: 22px; max-width: 300px; line-height: 1.5; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,30,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        #restartBtn { background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); border: none; padding: 13px 34px; font-size: 16px; color: #0f0f23; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(241,196,15,0.4); }

            <div class="how-to-row"><div class="how-to-icon">👆</div><div>Tap top or bottom half of screen (mobile)</div></div>
            <div class="how-to-row"><div class="how-to-icon">🟥</div><div>Avoid the red blocks — one hit ends the run</div></div>

</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.13;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = 82;
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 500;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.15;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(filter); filter.connect(musicGain);
            o1.start(); lfo.start();
            musicNodes = [o1, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let player = { x: 50, y: 0, w: 40, h: 40 };
    let obstacles = [];
    let score = 0;
    let gameRunning = false;
    let frame = 0;
    let speed = 6;
    let groundY = 0;
    let playerLane = 1;
    let targetY = 0;
    let isMoving = false;
    let stripeOffset = 0;

    const LANE_COUNT = 3;
    let laneHeights = [];

    function initGame() {
        groundY = H - 60;
        laneHeights = [];
        for(let i=0; i<LANE_COUNT; i++) laneHeights.push(groundY - 30 - i * 80);
        playerLane = 1;
        player.y = laneHeights[1] - player.h/2;
        targetY = player.y;
        obstacles = [];
        score = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = '0';
        frame = 0;
        speed = 6;
        isMoving = false;
    }

    function handleInput(e) {
        if(!gameRunning) return;
        let dy = 0;
        if(e.type === 'keydown') {
            if(e.key === 'ArrowUp' || e.key === 'w') dy = -1;
            else if(e.key === 'ArrowDown' || e.key === 's') dy = 1;
        } else if(e.type === 'touchstart' || e.type === 'mousedown') {
            const rect = canvas.getBoundingClientRect();
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            if(clientY === undefined) return;
            const my = clientY - rect.top;
            if(my < H/2) dy = -1;
            else dy = 1;
        }

        let newLane = playerLane + dy;
        if(newLane >= 0 && newLane < LANE_COUNT) {
            playerLane = newLane;
            targetY = laneHeights[playerLane] - player.h/2;
            isMoving = true;
            SFX.tone(400, 0.06, 'square', 0.15, 600);
        }
    }

    document.addEventListener('keydown', handleInput);
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });

    function spawnObstacle() {
        let lane = Math.floor(Math.random() * LANE_COUNT);
        if(Math.abs(lane - playerLane) < 1 && obstacles.length > 0) lane = (lane + 1) % LANE_COUNT;
        let y = laneHeights[lane] - 25;
        obstacles.push({ x: W + 20, y: y, w: 25, h: 25, lane: lane });
    }

    function update() {
        if(!gameRunning) return;
        frame++;
        stripeOffset = (stripeOffset + speed) % 40;

        if(isMoving) {
            let dy = targetY - player.y;
            if(Math.abs(dy) < 2) { player.y = targetY; isMoving = false; }
            else player.y += dy * 0.2;
        }

        let spawnRate = Math.max(25, 60 - Math.floor(score / 10));
        if(frame % spawnRate === 0) spawnObstacle();
        speed = 6 + Math.floor(score / 20);

        for(let i=obstacles.length-1; i>=0; i--) {
            let o = obstacles[i];
            o.x -= speed;

            if(o.x < player.x + player.w && o.x + o.w > player.x &&
               o.y < player.y + player.h && o.y + o.h > player.y) {
                gameRunning = false;
                SFX.noiseThud(0.3, 0.35);
                finalScoreEl.innerText = 'Score: ' + score;
                gameOverDiv.style.display = 'block';
                return;
            }

            if(o.x + o.w < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreEl.innerText = score;
                SFX.tone(600, 0.06, 'sine', 0.18, 900);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#0f0f23');
        bg.addColorStop(1, '#1a1a30');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#181832';
        ctx.fillRect(0, groundY, W, H - groundY);
        ctx.strokeStyle = '#4facfe';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(W, groundY);
        ctx.stroke();

        // Moving speed stripes for a sense of motion
        ctx.strokeStyle = 'rgba(79,172,254,0.15)';
        ctx.lineWidth = 3;
        for(let x = -40 + stripeOffset; x < W; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, groundY + 5);
            ctx.lineTo(x - 20, H);
            ctx.stroke();
        }

        ctx.setLineDash([10, 15]);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for(let i=1; i<LANE_COUNT; i++) {
            let y = laneHeights[i] + 25;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        for(let o of obstacles) {
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            roundRect(ctx, o.x, o.y, o.w, o.h, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        ctx.fillStyle = '#4facfe';
        ctx.shadowColor = '#4facfe';
        ctx.shadowBlur = 20;
        roundRect(ctx, player.x, player.y, player.w, player.h, 8);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(player.x + 10, player.y + 12, 6, 0, Math.PI*2);
        ctx.arc(player.x + 30, player.y + 12, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#0f0f23';
        ctx.beginPath();
        ctx.arc(player.x + 12, player.y + 14, 3, 0, Math.PI*2);
        ctx.arc(player.x + 32, player.y + 14, 3, 0, Math.PI*2);
        ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
