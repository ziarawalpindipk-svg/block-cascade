<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.35;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H, cellSize, padding;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
        cellSize = Math.min(W, H) / 5.5;
        padding = cellSize * 0.1;
    }
    resize();
    window.addEventListener('resize', resize);

    let grid = [];
    let score = 0;
    let gameRunning = false;
    let selectedCell = null;
    let isAnimating = false;

    function initGame() {
        grid = [];
        for(let r=0; r<4; r++) {
            let row = [];
            for(let c=0; c<4; c++) row.push(Math.floor(Math.random() * 3) + 1);
            grid.push(row);
        }
        score = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = 'Score: 0';
        selectedCell = null;
        isAnimating = false;
    }

    function handleClick(e) {
        if(!gameRunning || isAnimating) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const mx = clientX - rect.left;
        const my = clientY - rect.top;

        const totalSize = 4 * cellSize + 5 * padding;
        const offsetX = (W - totalSize) / 2;
        const offsetY = (H - totalSize) / 2 + 30;

        const col = Math.floor((mx - offsetX) / (cellSize + padding));
        const row = Math.floor((my - offsetY) / (cellSize + padding));

        if(row >= 0 && row < 4 && col >= 0 && col < 4) {
            if(selectedCell === null) {
                selectedCell = {row, col};
                SFX.tone(400, 0.05, 'sine', 0.15, 500);
            } else if(selectedCell.row === row && selectedCell.col === col) {
                selectedCell = null;
            } else {
                let r1 = selectedCell.row, c1 = selectedCell.col;
                let r2 = row, c2 = col;
                let val1 = grid[r1][c1];
                let val2 = grid[r2][c2];

                if(val1 === val2) {
                    isAnimating = true;
                    grid[r1][c1] = 0;
                    grid[r2][c2] = val1 + 1;
                    score += val1 * 2;
                    scoreEl.innerText = 'Score: ' + score;
                    SFX.tone(500 + val1*40, 0.12, 'sine', 0.3, 900);
                    selectedCell = null;

                    let emptyCells = [];
                    for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(grid[r][c] === 0) emptyCells.push({r, c});
                    if(emptyCells.length > 0) {
                        let pos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                        grid[pos.r][pos.c] = Math.floor(Math.random() * 3) + 1;
                    }
                    isAnimating = false;
                    checkGameOver();
                } else {
                    selectedCell = {row, col};
                    SFX.tone(200, 0.06, 'sine', 0.15, 150);
                }
            }
        }
    }

    function checkGameOver() {
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(grid[r][c] === 0) return;
        for(let r=0; r<4; r++) {
            for(let c=0; c<4; c++) {
                let val = grid[r][c];
                if(c+1 < 4 && grid[r][c+1] === val) return;
                if(r+1 < 4 && grid[r+1][c] === val) return;
            }
        }
        gameRunning = false;
        SFX.noiseThud(0.3, 0.3);
        finalMsg.innerText = score;
        gameOverDiv.style.display = 'block';
    }

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, { passive: false });

    function draw() {
        if(grid.length === 0) return;
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#3a3f5e');
        bg.addColorStop(1, '#2d3436');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        const totalSize = 4 * cellSize + 5 * padding;
        const offsetX = (W - totalSize) / 2;
        const offsetY = (H - totalSize) / 2 + 30;

        for(let r=0; r<4; r++) {
            for(let c=0; c<4; c++) {
                const x = offsetX + padding + c * (cellSize + padding);
                const y = offsetY + padding + r * (cellSize + padding);
                const val = grid[r][c];

                ctx.fillStyle = '#3d3d4e';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 5;
                ctx.fillRect(x, y, cellSize, cellSize);
                ctx.shadowBlur = 0;

                if(selectedCell && selectedCell.row === r && selectedCell.col === c) {
                    ctx.strokeStyle = '#f1c40f';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, cellSize, cellSize);
                }

                if(val > 0) {
                    ctx.fillStyle = val % 2 === 0 ? '#feca57' : '#4facfe';
                    ctx.shadowColor = val % 2 === 0 ? '#feca57' : '#4facfe';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(x + cellSize/2, y + cellSize/2, cellSize * 0.35, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = '#2d3436';
                    ctx.font = `bold ${cellSize * 0.3}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(val, x + cellSize/2, y + cellSize/2);
                }
            }
        }

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Tap two matching dice to merge them!', W/2, H - 20);
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
