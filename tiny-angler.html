        #introOverlay { position: absolute; inset: 0; background: rgba(6,20,45,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; pointer-events: auto; z-index: 20; }
        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #4facfe 0%, #f1c40f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .how-to-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; color: #ddd; font-size: 14px; max-width: 290px; text-align: left; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,25,55,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(79,172,254,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        #restartBtn { background: linear-gradient(135deg, #4facfe 0%, #f1c40f 100%); border: none; padding: 13px 34px; font-size: 16px; color: #0f3460; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(79,172,254,0.4); }

        #ad-banner-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; color: #ddd; font-size: 12px; pointer-events: none; z-index: 10; }

<body>

            <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" id="backBtn">⬅ Games</a>

<div id="container-37bcd87f9b90a477e2b211daed1f289b"></div></div>

</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.12;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 130;
            const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 196;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.06;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const moneyEl = document.getElementById('money');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let fish = [];
    let bubbles = [];
    let hook = { x: 0, y: 0, depth: 0, goingDown: true, speed: 2 };
    let score = 0;
    let money = 0;
    let gameRunning = false;
    let frame = 0;

    function initGame() {
        fish = [];
        bubbles = [];
        hook.x = W/2;
        hook.y = 40;
        hook.depth = 0;
        hook.goingDown = true;
        hook.speed = 2;
        score = 0;
        money = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = 'Fish: 0';
        moneyEl.innerText = '💰 $0';
    }

    function spawnFish() {
        let size = 10 + Math.random() * 30;
        let value = Math.floor(size / 5) + 1;
        fish.push({
            x: Math.random() * (W - 40) + 20,
            y: 100 + Math.random() * (H - 150),
            size, value,
            speed: 0.5 + Math.random() * 1.5,
            direction: Math.random() > 0.5 ? 1 : -1
        });
    }

    function spawnBubble() {
        bubbles.push({ x: Math.random()*W, y: H, r: 2 + Math.random()*4, speed: 0.5 + Math.random()*1.2 });
    }

    function handleTap() {
        if(!gameRunning) return;
        hook.goingDown = !hook.goingDown;
    }

    canvas.addEventListener('mousedown', handleTap);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); }, { passive: false });

    function update() {
        if(!gameRunning) return;
        frame++;

        if(frame % 40 === 0 && fish.length < 10) spawnFish();
        if(frame % 20 === 0) spawnBubble();

        for(let f of fish) {
            f.x += f.speed * f.direction;
            if(f.x < 20 || f.x > W - 20) f.direction *= -1;
        }

        for(let i=bubbles.length-1; i>=0; i--) {
            bubbles[i].y -= bubbles[i].speed;
            if(bubbles[i].y < 30) bubbles.splice(i, 1);
        }

        if(hook.goingDown) {
            hook.depth += hook.speed;
            if(hook.depth > H - 40) hook.goingDown = false;
        } else {
            hook.depth -= hook.speed;
            if(hook.depth < 40) { hook.depth = 40; hook.goingDown = true; }
        }
        hook.y = hook.depth;

        for(let i=fish.length-1; i>=0; i--) {
            let f = fish[i];
            let dx = hook.x - f.x, dy = hook.y - f.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < f.size/2 + 8) {
                score++;
                money += f.value;
                scoreEl.innerText = 'Fish: ' + score;
                moneyEl.innerText = '💰 $' + money;
                SFX.tone(500 + f.value*20, 0.15, 'sine', 0.3, 900);
                fish.splice(i, 1);
                hook.goingDown = false;
                break;
            }
        }

        if(hook.depth >= H - 40 && hook.goingDown) {
            gameRunning = false;
            SFX.noiseThud(0.3, 0.3);
            finalScoreEl.innerText = score;
            gameOverDiv.style.display = 'block';
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f3460');
        grad.addColorStop(0.5, '#1a5276');
        grad.addColorStop(1, '#0a2647');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(0, 30, W, 20);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        for(let i=0; i<W; i+=10) {
            let waveY = 40 + Math.sin(i * 0.05 + Date.now() * 0.001) * 3;
            ctx.beginPath();
            ctx.moveTo(i, waveY);
            ctx.lineTo(i+5, waveY-2);
            ctx.stroke();
        }

        for(let b of bubbles) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        for(let f of fish) {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size/2, 0, Math.PI*2);
            ctx.fillStyle = f.direction > 0 ? '#feca57' : '#ff6b6b';
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(f.x + (f.direction > 0 ? 4 : -4), f.y - 2, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(f.x + (f.direction > 0 ? 5 : -5), f.y - 2, 1.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = f.direction > 0 ? '#f39c12' : '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(f.x + (f.direction > 0 ? -f.size/2 : f.size/2), f.y);
            ctx.lineTo(f.x + (f.direction > 0 ? -f.size/2 - 10 : f.size/2 + 10), f.y - 8);
            ctx.lineTo(f.x + (f.direction > 0 ? -f.size/2 - 10 : f.size/2 + 10), f.y + 8);
            ctx.closePath();
            ctx.fill();
        }

        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(hook.x, 30);
        ctx.lineTo(hook.x, hook.y);
        ctx.stroke();

        ctx.fillStyle = '#bdc3c7';
        ctx.strokeStyle = '#7f8c8d';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(hook.x, hook.y, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#7f8c8d';
        ctx.beginPath();
        ctx.arc(hook.x + 6, hook.y + 2, 3, 0, Math.PI*2);
        ctx.fill();

        if(gameRunning) {
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎣 Tap to Reel', W/2, H - 15);
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
