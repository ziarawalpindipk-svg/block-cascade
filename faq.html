<style>
  body {
    margin: 0;
    background: radial-gradient(circle at 25% -10%, #2b1a4a 0%, #1a1030 55%);
    color: #f4eefc;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    padding: 28px 20px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Baloo 2', sans-serif; font-size: 26px; margin-bottom: 20px; }
  p, li { color: #ddd3ee; font-size: 14.5px; }
  a { color: #2dd4bf; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back { display: inline-block; margin-bottom: 20px; color: #b3a0d4; font-size: 13px; }
  #ad-banner-faq { width: 100%; max-width: 400px; min-height: 50px; margin: 0 auto 20px; border-radius: 10px; overflow: hidden; }
  .faq-item { background: #24163f; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .faq-q {
    padding: 16px 18px; cursor: pointer; font-family: 'Baloo 2', sans-serif; font-weight: 700;
    font-size: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .faq-q .arrow { color: #ff9d90; transition: transform 0.2s; flex-shrink: 0; }
  .faq-item.open .faq-q .arrow { transform: rotate(180deg); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; padding: 0 18px; }
  .faq-item.open .faq-a { max-height: 300px; padding: 0 18px 16px; }
  .faq-a p { margin: 0; font-size: 14px; color: #cfc4e6; }
</style>

<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; Back to Home</a>

  <div id="ad-banner-faq"></div>

  <h1>Frequently Asked Questions</h1>

  <div id="faq-list"></div>

  <p style="margin-top:22px;">Still have a question? <a href="contact_us.html">Contact us</a> and we'll get back to you.</p>
</div>

<script>
  const faqs = [
    { q: "Is Play Vault really free?", a: "Yes! Every game on Play Vault is 100% free to play. There are no hidden fees, subscriptions, or paywalls. The site is supported by ads shown through our advertising partner, Adsterra." },
    { q: "Do I need to download anything?", a: "No download or installation is required. All games run directly in your mobile or desktop browser — just tap Play Now and start playing instantly." },
    { q: "Do I need to create an account?", a: "No account or sign-up is needed to play any game on Play Vault." },
    { q: "Will my scores be saved?", a: "Most games track your score or progress only for the current session in your browser. Some games may save your best score locally on your device." },
    { q: "Can I play on my phone?", a: "Yes, every game on Play Vault is built to be mobile-friendly and works on phones, tablets, and desktop browsers." },
    { q: "How many games are on Play Vault?", a: "Play Vault currently offers 20+ free games across puzzle, arcade, action, and casual categories, with new games added regularly." },
    { q: "Why do I see ads?", a: "Ads help us keep every game on Play Vault free for everyone. We work with Adsterra to display banner, native, and interstitial ads. See our Privacy Policy for details." },
    { q: "I found a bug — what should I do?", a: "Please let us know! Visit our Contact Us page or email ziarawalpindipk@gmail.com with details about the issue and which game it happened in." },
    { q: "Can I suggest a new game?", a: "Absolutely — we're always looking for new game ideas. Send your suggestion through the Contact Us page." }
  ];

  const list = document.getElementById('faq-list');
  faqs.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'faq-item';
    div.innerHTML = `
      <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
        <span>${item.q}</span>
        <span class="arrow">▾</span>
      </div>
      <div class="faq-a"><p>${item.a}</p></div>
    `;
    list.appendChild(div);
  });
</script>
</body>
