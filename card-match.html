        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #2ed573 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #introOverlay p { color: #b8b8c8; font-size: 14px; margin-bottom: 22px; max-width: 300px; line-height: 1.5; }
        .how-to-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; color: #ddd; font-size: 14px; max-width: 290px; text-align: left; }
        .how-to-icon { font-size: 22px; width: 34px; text-align: center; flex-shrink: 0; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,30,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(46,213,115,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #gameOver h1 { font-size: 30px; margin-bottom: 10px; color: #2ed573; }

        #finalMsg { color: #2ed573; font-weight: 800; }
        #gameOverAd { width: 260px; height: 60px; margin: 16px auto 0; background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.25); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #777; font-size: 11px; overflow: hidden; }
        #restartBtn { background: linear-gradient(135deg, #2ed573 0%, #4facfe 100%); border: none; padding: 13px 34px; font-size: 16px; color: #1a1a2e; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(46,213,115,0.4); }

        #ad-banner-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; color: #666; font-size: 12px; pointer-events: none; z-index: 10; }
        #ad-social-top { position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; background: transparent; pointer-events: none; z-index: 10; }

            <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" id="backBtn">⬅ Games</a>

                <div id="moves">Moves: 0</div>

</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.35;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const movesEl = document.getElementById('moves');
    const pairsEl = document.getElementById('pairs');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H, cardSize, padding;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
        cardSize = Math.min(W, H) / 5.5;
        padding = cardSize * 0.15;
    }
    resize();
    window.addEventListener('resize', resize);

    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let gameRunning = false;
    let isProcessing = false;

    const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];

    function initGame() {
        let deck = [];
        for(let i=0; i<emojis.length; i++) {
            deck.push({ id: i, emoji: emojis[i], isFlipped: false, isMatched: false });
            deck.push({ id: i, emoji: emojis[i], isFlipped: false, isMatched: false });
        }
        for(let i=deck.length-1; i>0; i--) {
            const j = Math.floor(Math.random() * (i+1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        cards = deck;
        flippedCards = [];
        matchedPairs = 0;
        moves = 0;
        gameRunning = true;
        isProcessing = false;
        gameOverDiv.style.display = 'none';
        movesEl.innerText = 'Moves: 0';
        pairsEl.innerText = 'Pairs: 0 / 8';
    }

    function handleClick(e) {
        if(!gameRunning || isProcessing) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const mx = clientX - rect.left;
        const my = clientY - rect.top;

        const totalWidth = 4 * (cardSize + padding) - padding;
        const offsetX = (W - totalWidth) / 2;
        const offsetY = (H - (4 * (cardSize + padding) - padding)) / 2 + 40;

        const col = Math.floor((mx - offsetX) / (cardSize + padding));
        const row = Math.floor((my - offsetY) / (cardSize + padding));
        const index = row * 4 + col;

        if(row >= 0 && row < 4 && col >= 0 && col < 4 && index < cards.length) {
            let card = cards[index];
            if(!card.isFlipped && !card.isMatched) {
                card.isFlipped = true;
                flippedCards.push(index);
                SFX.tone(450, 0.06, 'sine', 0.2, 600);

                if(flippedCards.length === 2) {
                    moves++;
                    movesEl.innerText = 'Moves: ' + moves;
                    isProcessing = true;
                    let idx1 = flippedCards[0];
                    let idx2 = flippedCards[1];
                    if(cards[idx1].id === cards[idx2].id) {
                        cards[idx1].isMatched = true;
                        cards[idx2].isMatched = true;
                        matchedPairs++;
                        pairsEl.innerText = 'Pairs: ' + matchedPairs + ' / 8';
                        SFX.tone(600, 0.1, 'sine', 0.3, 900);
                        flippedCards = [];
                        isProcessing = false;
                        if(matchedPairs === 8) {
                            gameRunning = false;
                            SFX.tone(500, 0.15, 'sine', 0.35, 900);
                            SFX.tone(750, 0.2, 'sine', 0.35, 1200);
                            finalMsg.innerText = moves;
                            gameOverDiv.style.display = 'block';
                        }
                    } else {
                        setTimeout(() => {
                            cards[idx1].isFlipped = false;
                            cards[idx2].isFlipped = false;
                            flippedCards = [];
                            isProcessing = false;
                            SFX.tone(250, 0.1, 'sine', 0.2, 180);
                        }, 600);
                    }
                }
            }
        }
    }

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, { passive: false });

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#3a3f5e');
        bg.addColorStop(1, '#2d3436');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        const totalWidth = 4 * (cardSize + padding) - padding;
        const offsetX = (W - totalWidth) / 2;
        const offsetY = (H - (4 * (cardSize + padding) - padding)) / 2 + 40;

        for(let i=0; i<cards.length; i++) {
            let card = cards[i];
            const row = Math.floor(i / 4);
            const col = i % 4;
            const x = offsetX + col * (cardSize + padding);
            const y = offsetY + row * (cardSize + padding);

            if(card.isMatched) continue;

            if(card.isFlipped) {
                ctx.fillStyle = '#dfe6e9';
                ctx.shadowColor = '#2ed573';
                ctx.shadowBlur = 12;
                roundRect(ctx, x, y, cardSize, cardSize, 8);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#2d3436';
                ctx.font = `${cardSize * 0.6}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(card.emoji, x + cardSize/2, y + cardSize/2);
            } else {
                let grad = ctx.createLinearGradient(x, y, x + cardSize, y + cardSize);
                grad.addColorStop(0, '#4facfe');
                grad.addColorStop(1, '#3a7bd5');
                ctx.fillStyle = grad;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 8;
                roundRect(ctx, x, y, cardSize, cardSize, 8);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.font = `bold ${cardSize * 0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('?', x + cardSize/2, y + cardSize/2);
            }

            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            roundRect(ctx, x, y, cardSize, cardSize, 8);
            ctx.stroke();
        }
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
</body>
