    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        #gameContainer { position: relative; width: 100%; height: 100%; max-width: 500px; max-height: 800px; background: #34495e; touch-action: none; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.6); }

        #score { font-size: 22px; font-weight: 800; color: #f1c40f; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

        #soundControls { pointer-events: auto; display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 10px; flex-shrink: 0; }
        #muteBtn { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 0; line-height: 1; }
        #volumeSlider { width: 50px; accent-color: #f1c40f; cursor: pointer; }

        #introOverlay { position: absolute; inset: 0; background: rgba(15,25,35,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; pointer-events: auto; z-index: 20; }
        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #a29bfe 0%, #fd79a8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #introOverlay p { color: #b8c8dc; font-size: 14px; margin-bottom: 22px; max-width: 300px; line-height: 1.5; }
        .how-to-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; color: #ddd; font-size: 14px; max-width: 290px; text-align: left; }
        .how-to-icon { font-size: 22px; width: 34px; text-align: center; flex-shrink: 0; }
        #startBtn { margin-top: 20px; background: linear-gradient(135deg, #a29bfe 0%, #fd79a8 100%); border: none; color: #fff; font-weight: 700; font-size: 16px; padding: 14px 40px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(162,155,254,0.4); }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,30,45,0.95); color: white; padding: 30px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #gameOver h1 { font-size: 28px; margin-bottom: 10px; color: #ff6b6b; }
        #gameOver p { color: #b8c8dc; font-size: 15px; }
        #finalScore { color: #f1c40f; font-weight: 800; }
        #gameOverAd { width: 260px; height: 60px; margin: 14px auto 0; background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.25); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #777; font-size: 11px; }
        #restartBtn { background: #f1c40f; border: none; padding: 12px 30px; font-size: 18px; color: #2c3e50; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 14px; }

        #ad-banner-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; color: #666; font-size: 12px; pointer-events: none; z-index: 10; }
        #ad-social-top { position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; background: transparent; pointer-events: none; z-index: 10; }
    </style>
    </head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="topBar">
            <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" id="backBtn">⬅ Games</a>
            <div id="score">Score: 0</div>
            <div id="soundControls">
                <button id="muteBtn">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>
        </div>

        <div id="introOverlay">
            <h1>Jewel Swap</h1>
            <p>Match 3 or more jewels in a row to clear them and score points.</p>
            <div class="how-to-row"><div class="how-to-icon">👆</div><div>Tap a jewel, then tap an adjacent one to swap</div></div>
            <div class="how-to-row"><div class="how-to-icon">💎</div><div>Line up 3+ matching jewels to clear them</div></div>
            <div class="how-to-row"><div class="how-to-icon">⚠️</div><div>Game ends when no more moves are possible</div></div>
            <button id="startBtn">▶ Start Game</button>
        </div>

        <div id="gameOver">
            <h1>No Moves Left!</h1>
            <p>Score: <span id="finalScore">0</span></p>

<div id="container-37bcd87f9b90a477e2b211daed1f289b"></div></div>
            <button id="restartBtn">▶ New Game</button>
        </div>
    </div>
</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.12;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H, gridSize, rows, cols;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
        gridSize = Math.min(W, H) / 7;
        cols = Math.floor(W / gridSize);
        rows = Math.floor(H / gridSize);
        if(rows > 7) rows = 7;
        if(cols > 7) cols = 7;
        gridSize = Math.min(W / cols, H / rows);
    }
    resize();
    window.addEventListener('resize', resize);

    let board = [];
    let score = 0;
    let gameRunning = false;
    let selected = null;
    let isAnimating = false;

    const jewelColors = ['#a29bfe', '#ff6b6b', '#2ed573', '#4facfe', '#feca57', '#fd79a8'];

    function initBoard() {
        board = [];
        for(let r=0; r<rows; r++) {
            let row = [];
            for(let c=0; c<cols; c++) row.push(Math.floor(Math.random() * jewelColors.length));
            board.push(row);
        }
        while(removeMatches(true)) {}
        score = 0;
        scoreEl.innerText = 'Score: 0';
        selected = null;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
    }

    function getColor(type) { return jewelColors[type]; }

    function removeMatches(isInitial) {
        let matches = [];
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols-2; c++) {
                if(board[r][c] !== -1 && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                    let type = board[r][c];
                    let end = c+2;
                    while(end+1 < cols && board[r][end+1] === type) end++;
                    for(let i=c; i<=end; i++) matches.push({r, c:i});
                    c = end;
                }
            }
        }
        for(let c=0; c<cols; c++) {
            for(let r=0; r<rows-2; r++) {
                if(board[r][c] !== -1 && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                    let type = board[r][c];
                    let end = r+2;
                    while(end+1 < rows && board[end+1][c] === type) end++;
                    for(let i=r; i<=end; i++) matches.push({r:i, c});
                    r = end;
                }
            }
        }

        if(matches.length === 0) return false;

        let points = matches.length * 10;
        if(!isInitial) {
            score += points;
            scoreEl.innerText = 'Score: ' + score;
            SFX.tone(500 + Math.min(matches.length*30, 400), 0.12, 'sine', 0.3, 900);
        }

        for(let m of matches) board[m.r][m.c] = -1;

        for(let c=0; c<cols; c++) {
            let writeRow = rows-1;
            for(let r=rows-1; r>=0; r--) {
                if(board[r][c] !== -1) {
                    board[writeRow][c] = board[r][c];
                    if(writeRow !== r) board[r][c] = -1;
                    writeRow--;
                }
            }
            for(let r=writeRow; r>=0; r--) board[r][c] = Math.floor(Math.random() * jewelColors.length);
        }
        return true;
    }

    function hasValidMoves() {
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols-1; c++) {
                let temp = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = temp;
                let found = false;
                for(let cc=0; cc<cols-2; cc++) if(board[r][cc] !== -1 && board[r][cc] === board[r][cc+1] && board[r][cc] === board[r][cc+2]) { found = true; break; }
                if(!found) for(let rr=0; rr<rows-2; rr++) if(board[rr][c] !== -1 && board[rr][c] === board[rr+1][c] && board[rr][c] === board[rr+2][c]) { found = true; break; }
                let temp2 = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = temp2;
                if(found) return true;
            }
        }
        for(let r=0; r<rows-1; r++) {
            for(let c=0; c<cols; c++) {
                let temp = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = temp;
                let found = false;
                for(let cc=0; cc<cols-2; cc++) if(board[r][cc] !== -1 && board[r][cc] === board[r][cc+1] && board[r][cc] === board[r][cc+2]) { found = true; break; }
                if(!found) for(let rr=0; rr<rows-2; rr++) if(board[rr][c] !== -1 && board[rr][c] === board[rr+1][c] && board[rr][c] === board[rr+2][c]) { found = true; break; }
                let temp2 = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = temp2;
                if(found) return true;
            }
        }
        return false;
    }

    function handleClick(e) {
        if(!gameRunning || isAnimating) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const col = Math.floor(x / gridSize);
        const row = Math.floor(y / gridSize);
        if(row >= rows || col >= cols) return;

        if(selected === null) {
            selected = {row, col};
            SFX.tone(400, 0.05, 'sine', 0.15, 500);
        } else if(selected.row === row && selected.col === col) {
            selected = null;
        } else if(Math.abs(selected.row - row) + Math.abs(selected.col - col) === 1) {
            isAnimating = true;
            let temp = board[row][col];
            board[row][col] = board[selected.row][selected.col];
            board[selected.row][selected.col] = temp;

            if(removeMatches(false)) {
                selected = null;
                while(removeMatches(false)) {}
                if(!hasValidMoves()) {
                    gameRunning = false;
                    SFX.noiseThud(0.3, 0.3);
                    finalScoreEl.innerText = 'Score: ' + score;
                    gameOverDiv.style.display = 'block';
                }
                isAnimating = false;
            } else {
                let temp2 = board[row][col];
                board[row][col] = board[selected.row][selected.col];
                board[selected.row][selected.col] = temp2;
                selected = null;
                isAnimating = false;
                SFX.tone(200, 0.08, 'sine', 0.15, 150);
            }
        } else {
            selected = {row, col};
        }
    }

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, { passive: false });

    function drawJewel(x, y, size, color) {
        const cx = x + size/2, cy = y + size/2, r = size/2 - 4;
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r);
        ctx.lineTo(cx + r*0.8, cy - r*0.3);
        ctx.lineTo(cx + r*0.55, cy + r);
        ctx.lineTo(cx - r*0.55, cy + r);
        ctx.lineTo(cx - r*0.8, cy - r*0.3);
        ctx.closePath();
        let grad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
        grad.addColorStop(0, '#ffffff99');
        grad.addColorStop(0.35, color);
        grad.addColorStop(1, color);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
    }

    function draw() {
        if(board.length === 0) return;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(0, 0, W, H);

        const offsetX = (W - cols * gridSize) / 2;
        const offsetY = (H - rows * gridSize) / 2;

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                const x = offsetX + c * gridSize;
                const y = offsetY + r * gridSize;

                ctx.fillStyle = '#34495e';
                ctx.fillRect(x, y, gridSize, gridSize);
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, gridSize, gridSize);

                if(board[r][c] !== -1) {
                    drawJewel(x, y, gridSize, getColor(board[r][c]));
                    if(selected && selected.row === r && selected.col === c) {
                        ctx.strokeStyle = '#f1c40f';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, gridSize, gridSize);
                    }
                }
            }
        }
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initBoard();
    };
    restartBtn.onclick = initBoard;

    draw();
    loop();
</script>
