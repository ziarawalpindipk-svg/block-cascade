        #introOverlay h1 { font-size: 27px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,30,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #gameOver h1 { font-size: 28px; margin-bottom: 10px; color: #f1c40f; }

        #restartBtn { background: linear-gradient(135deg, #f1c40f 0%, #ff6b6b 100%); border: none; padding: 13px 34px; font-size: 16px; color: #2d3436; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(241,196,15,0.4); }

        #ad-banner-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; color: #666; font-size: 12px; pointer-events: none; z-index: 10; }

<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="topBar">
            <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" id="backBtn">⬅ Games</a>
            <div id="score">Score: 0</div>
            <div id="shots">💥 5</div>

                <button id="muteBtn">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>
        </div>

        <div id="introOverlay">
            <h1>Catapult Fury</h1>
            <p>Launch your projectile and destroy every target.</p>
            <div class="how-to-row"><div class="how-to-icon">👆</div><div>Drag near the slingshot to aim</div></div>
            <div class="how-to-row"><div class="how-to-icon">🎯</div><div>Release to launch — further pull, more power</div></div>
            <div class="how-to-row"><div class="how-to-icon">💥</div><div>Clear all targets before you run out of shots</div></div>
            <button id="startBtn">▶ Start Launching</button>
        </div>

        <div id="gameOver">
            <h1 id="resultTitle">LEVEL COMPLETE!</h1>
            <p>Score: <span id="finalMsg">0</span></p>
            <div id="gameOverAd"><script async="async" data-cfasync="false" src="https://pl30278109.effectivecpmnetwork.com/37bcd87f9b90a477e2b211daed1f289b/invoke.js"></script>
<div id="container-37bcd87f9b90a477e2b211daed1f289b"></div></div>
            <button id="restartBtn">▶ New Level</button>
        </div>
    </div>
</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.11;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const shotsEl = document.getElementById('shots');
    const finalMsg = document.getElementById('finalMsg');
    const resultTitle = document.getElementById('resultTitle');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let projectile = null;
    let targets = [];
    let score = 0;
    let shots = 5;
    let gameRunning = false;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let dragEnd = { x: 0, y: 0 };
    let isFlying = false;

    const GRAVITY = 0.5;
    const GROUND_Y_OFFSET = 60;

    function initGame() {
        targets = [];
        score = 0;
        shots = 5;
        gameRunning = true;
        isDragging = false;
        isFlying = false;
        projectile = null;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = 'Score: 0';
        shotsEl.innerText = '💥 ' + shots;

        for(let i=0; i<3; i++) {
            targets.push({ x: W - 80 - i * 60, y: H - GROUND_Y_OFFSET - 40, w: 30, h: 40, color: i === 0 ? '#ff6b6b' : '#feca57' });
            targets.push({ x: W - 80 - i * 60 + 5, y: H - GROUND_Y_OFFSET - 80, w: 20, h: 20, color: '#4facfe' });
        }
    }

    function handleMouseDown(e) {
        if(!gameRunning || isFlying) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;
        const mx = clientX - rect.left, my = clientY - rect.top;
        if(mx < W * 0.4 && my > H * 0.3) {
            isDragging = true;
            dragStart = { x: mx, y: my };
            dragEnd = { x: mx, y: my };
        }
    }

    function handleMouseMove(e) {
        if(!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;
        dragEnd = { x: clientX - rect.left, y: clientY - rect.top };
    }

    function handleMouseUp() {
        if(!isDragging) return;
        isDragging = false;

        let dx = dragStart.x - dragEnd.x;
        let dy = dragStart.y - dragEnd.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist > 20) {
            let power = dist * 0.5;
            let angle = Math.atan2(dy, dx);
            projectile = { x: dragStart.x, y: dragStart.y, r: 10, vx: power * Math.cos(angle), vy: -power * Math.sin(angle), color: '#f1c40f' };
            isFlying = true;
            shots--;
            shotsEl.innerText = '💥 ' + shots;
            SFX.tone(300, 0.1, 'sine', 0.3, 900);
        }
    }

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleMouseDown(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMouseMove(e); }, { passive: false });
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleMouseUp(); }, { passive: false });

    function update() {
        if(!gameRunning) return;

        if(isFlying && projectile) {
            projectile.x += projectile.vx;
            projectile.y += projectile.vy;
            projectile.vy += GRAVITY;

            for(let i=targets.length-1; i>=0; i--) {
                let t = targets[i];
                let cx = Math.max(t.x, Math.min(projectile.x, t.x + t.w));
                let cy = Math.max(t.y, Math.min(projectile.y, t.y + t.h));
                let dx = projectile.x - cx, dy = projectile.y - cy;
                if(dx*dx + dy*dy < projectile.r * projectile.r) {
                    score += 10;
                    scoreEl.innerText = 'Score: ' + score;
                    SFX.noiseThud(0.15, 0.25);
                    targets.splice(i, 1);
                    isFlying = false;
                    projectile = null;
                    break;
                }
            }

            if(projectile) {
                if(projectile.y > H || projectile.x > W || projectile.x < 0) { isFlying = false; projectile = null; }
            }

            if(targets.length === 0) {
                gameRunning = false;
                resultTitle.innerText = 'LEVEL COMPLETE!';
                resultTitle.style.color = '#2ed573';
                SFX.tone(500, 0.15, 'sine', 0.35, 900);
                SFX.tone(750, 0.2, 'sine', 0.35, 1200);
                finalMsg.innerText = score;
                gameOverDiv.style.display = 'block';
                return;
            }

            if(shots <= 0 && !isFlying && targets.length > 0) {
                gameRunning = false;
                resultTitle.innerText = 'OUT OF SHOTS!';
                resultTitle.style.color = '#ff6b6b';
                SFX.noiseThud(0.3, 0.3);
                finalMsg.innerText = score;
                gameOverDiv.style.display = 'block';
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#3a3f4b');
        bg.addColorStop(1, '#2d3436');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#636e72';
        ctx.fillRect(0, H - GROUND_Y_OFFSET, W, GROUND_Y_OFFSET);
        ctx.strokeStyle = '#b2bec3';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, H - GROUND_Y_OFFSET);
        ctx.lineTo(W, H - GROUND_Y_OFFSET);
        ctx.stroke();

        for(let t of targets) {
            ctx.fillStyle = t.color;
            ctx.shadowColor = t.color;
            ctx.shadowBlur = 10;
            ctx.fillRect(t.x, t.y, t.w, t.h);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(t.x, t.y, t.w, t.h);
        }

        ctx.fillStyle = '#b2bec3';
        ctx.fillRect(70, H - GROUND_Y_OFFSET - 30, 10, 30);
        ctx.fillRect(90, H - GROUND_Y_OFFSET - 30, 10, 30);
        if(isDragging) {
            ctx.strokeStyle = '#dfe6e9';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(75, H - GROUND_Y_OFFSET - 20);
            ctx.lineTo(dragEnd.x, dragEnd.y);
            ctx.lineTo(95, H - GROUND_Y_OFFSET - 20);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(dragEnd.x, dragEnd.y, 10, 0, Math.PI*2);
            ctx.fillStyle = '#f1c40f';
            ctx.fill();
        } else if(projectile && isFlying) {
            ctx.beginPath();
            ctx.arc(projectile.x, projectile.y, projectile.r, 0, Math.PI*2);
            ctx.fillStyle = projectile.color;
            ctx.shadowColor = projectile.color;
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
        } else if(!projectile) {
            ctx.beginPath();
            ctx.arc(80, H - GROUND_Y_OFFSET - 30, 10, 0, Math.PI*2);
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = '#f1c40f';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        if(shots > 0 && targets.length > 0) ctx.fillText('Drag and release to launch!', W/2, H - 15);
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
