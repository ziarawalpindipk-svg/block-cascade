<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 70, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.35;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 110;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.09;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreVal');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H, gridSize, cols, rows;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
        gridSize = Math.min(W, H) / 20;
        cols = Math.floor(W / gridSize);
        rows = Math.floor(H / gridSize);
    }
    resize();
    window.addEventListener('resize', resize);

    let snake, food, direction, nextDirection, score, gameLoopInterval, gameRunning = false;

    function initGame() {
        const startX = Math.floor(cols / 2);
        const startY = Math.floor(rows / 2);
        snake = [{x: startX, y: startY}];
        direction = {dx: 1, dy: 0};
        nextDirection = {dx: 1, dy: 0};
        score = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = '0';
        spawnFood();
        clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(update, 150);
    }

    function spawnFood() {
        let pos;
        do {
            pos = {x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows)};
        } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
        food = pos;
    }

    function update() {
        if(!gameRunning) return;

        if (!(nextDirection.dx === -direction.dx && nextDirection.dy === -direction.dy)) {
            direction = {...nextDirection};
        }

        const head = {x: snake[0].x + direction.dx, y: snake[0].y + direction.dy};

        if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
            gameOver();
            return;
        }

        if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.innerText = score;
            SFX.tone(500, 0.1, 'sine', 0.25, 900);
            spawnFood();
        } else {
            snake.pop();
        }
    }

    function gameOver() {
        gameRunning = false;
        SFX.noiseThud(0.3, 0.3);
        finalScoreEl.innerText = score;
        gameOverDiv.style.display = 'block';
        clearInterval(gameLoopInterval);
    }

    document.addEventListener('keydown', (e) => {
        if(!gameRunning) return;
        switch(e.key) {
            case 'ArrowUp': if(direction.dy !== 1) nextDirection = {dx: 0, dy: -1}; break;
            case 'ArrowDown': if(direction.dy !== -1) nextDirection = {dx: 0, dy: 1}; break;
            case 'ArrowLeft': if(direction.dx !== 1) nextDirection = {dx: -1, dy: 0}; break;
            case 'ArrowRight': if(direction.dx !== -1) nextDirection = {dx: 1, dy: 0}; break;
        }
    });

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    }, {passive: true});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if(!gameRunning) return;
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0 && direction.dx !== -1) nextDirection = {dx: 1, dy: 0};
            else if (dx < 0 && direction.dx !== 1) nextDirection = {dx: -1, dy: 0};
        } else {
            if (dy > 0 && direction.dy !== -1) nextDirection = {dx: 0, dy: 1};
            else if (dy < 0 && direction.dy !== 1) nextDirection = {dx: 0, dy: -1};
        }
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    }, {passive: false});

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, W, H);

        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        for(let i=0; i<=cols; i++) {
            ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, H); ctx.stroke();
        }
        for(let i=0; i<=rows; i++) {
            ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(W, i*gridSize); ctx.stroke();
        }

        if(!food) return;

        // Food (glowing apple)
        const fx = food.x * gridSize + gridSize/2, fy = food.y * gridSize + gridSize/2;
        ctx.save();
        ctx.shadowColor = '#ff4757';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(fx, fy, gridSize/2 - 2, 0, Math.PI*2);
        ctx.fillStyle = '#ff4757';
        ctx.fill();
        ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(fx - gridSize*0.15, fy - gridSize*0.15, gridSize*0.12, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#2ed573';
        ctx.fillRect(fx - 1.5, fy - gridSize/2 - 1, 3, 5);

        // Snake
        snake.forEach((seg, index) => {
            const x = seg.x * gridSize, y = seg.y * gridSize;
            const padding = 2;
            const t = index / Math.max(snake.length - 1, 1);
            // Gradient from head (bright) to tail (darker)
            const r = Math.round(46 + (29 - 46) * t);
            const g = Math.round(213 + (209 - 213) * t);
            const b = Math.round(115 + (161 - 115) * t);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            if(index === 0) { ctx.shadowColor = '#2ed573'; ctx.shadowBlur = 10; }
            roundRect(ctx, x + padding, y + padding, gridSize - padding*2, gridSize - padding*2, 5);
            ctx.fill();
            ctx.shadowBlur = 0;

            if(index === 0) {
                let ex = gridSize/3, ey = gridSize/3;
                if(direction.dx === -1) ex = gridSize*2/3;
                if(direction.dy === 1) { ex = gridSize/3; ey = gridSize*2/3; }
                if(direction.dy === -1) { ex = gridSize/3; ey = gridSize/3; }
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(x + gridSize/3, y + gridSize/3, 3, 0, Math.PI*2);
                ctx.arc(x + gridSize*2/3, y + gridSize/3, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#16213e';
                ctx.beginPath();
                ctx.arc(x + gridSize/3 + 1, y + gridSize/3 + 1, 1.5, 0, Math.PI*2);
                ctx.arc(x + gridSize*2/3 + 1, y + gridSize/3 + 1, 1.5, 0, Math.PI*2);
                ctx.fill();
            }
        });
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
