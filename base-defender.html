        #introOverlay { position: absolute; inset: 0; background: rgba(10,10,20,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; pointer-events: auto; z-index: 20; }
        #introOverlay h1 { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 6px; background: linear-gradient(135deg, #4facfe 0%, #ff6b6b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #introOverlay p { color: #b8b8c8; font-size: 14px; margin-bottom: 22px; max-width: 300px; line-height: 1.5; }
        .how-to-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; color: #ddd; font-size: 14px; max-width: 290px; text-align: left; }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,30,0.95); color: white; padding: 32px 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; z-index: 15; border: 1px solid rgba(255,107,107,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #gameOver h1 { font-size: 28px; margin-bottom: 10px; color: #ff6b6b; }

        #gameOverAd { width: 260px; height: 60px; margin: 14px auto 0; background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.25); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #777; font-size: 11px; }
        #restartBtn { background: linear-gradient(135deg, #4facfe 0%, #ff6b6b 100%); border: none; padding: 13px 34px; font-size: 16px; color: #fff; font-weight: 700; border-radius: 25px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(79,172,254,0.4); }

        #ad-banner-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; color: #666; font-size: 12px; pointer-events: none; z-index: 10; }

<body>

<div id="gameContainer">

    <div id="ui">
        <div id="topBar">
            <a href="index.html" onclick="if(window.parent!==window&&window.parent.closeGame){window.parent.closeGame();return false;}" id="backBtn">⬅ Games</a>

            <div id="lives">❤️ 5</div>
            <div id="soundControls">
                <button id="muteBtn">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>

        <div id="introOverlay">
            <h1>Base Defender</h1>
            <p>Place towers to stop the invasion before it reaches the bottom.</p>
            <div class="how-to-row"><div class="how-to-icon">👆</div><div>Tap anywhere on the field to place a tower</div></div>
            <div class="how-to-row"><div class="how-to-icon">🔵</div><div>Towers auto-fire at the nearest enemy in range</div></div>
            <div class="how-to-row"><div class="how-to-icon">🧟</div><div>Purple enemies have more health</div></div>
            <div class="how-to-row"><div class="how-to-icon">⚠️</div><div>Enemies reaching the bottom cost a life</div></div>
            <button id="startBtn">▶ Start Defending</button>
        </div>

<div id="container-37bcd87f9b90a477e2b211daed1f289b"></div></div>
            <button id="restartBtn">▶ Defend Again</button>
        </div>

</div>

<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.11;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = 65;
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 450;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.04;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(filter); filter.connect(musicGain);
            o1.start(); lfo.start();
            musicNodes = [o1, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let towers = [];
    let enemies = [];
    let bullets = [];
    let lives = 5;
    let kills = 0;
    let gameRunning = false;
    let frame = 0;
    let selectedTowerIndex = -1;

    const TOWER_RADIUS = 35;
    const ENEMY_RADIUS = 12;

    function initGame() {
        towers = [];
        enemies = [];
        bullets = [];
        lives = 5;
        kills = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = 'Kills: 0';
        livesEl.innerText = '❤️ 5';
        frame = 0;
        selectedTowerIndex = -1;
        placeTower(W/2, H - 60);
    }

    function placeTower(x, y) {
        towers.push({ x, y, radius: TOWER_RADIUS, fireRate: 30, cooldown: 0, range: 120 });
        SFX.tone(500, 0.1, 'sine', 0.25, 700);
    }

    function handleClick(e) {
        if(!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if(clientX === undefined) return;

        const mx = clientX - rect.left;
        const my = clientY - rect.top;

        for(let i=0; i<towers.length; i++) {
            let t = towers[i];
            let dx = mx - t.x, dy = my - t.y;
            if(dx*dx + dy*dy < t.radius * t.radius) { selectedTowerIndex = i; return; }
        }

        let canPlace = true;
        for(let t of towers) {
            let dx = mx - t.x, dy = my - t.y;
            if(dx*dx + dy*dy < (t.radius + 20) * (t.radius + 20)) { canPlace = false; break; }
        }
        if(canPlace && my < H - 30) {
            placeTower(mx, my);
            selectedTowerIndex = towers.length - 1;
        }
    }

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, { passive: false });

    function spawnEnemy() {
        let x = Math.random() * W;
        let y = -20;
        let speed = 1 + Math.random() * 1.5;
        let health = 1;
        if(Math.random() < 0.2) { health = 2; speed = 0.8; }
        enemies.push({ x, y, radius: ENEMY_RADIUS, speed, health, maxHealth: health, color: health === 1 ? '#ff6b6b' : '#a29bfe' });
    }

    function update() {
        if(!gameRunning) return;
        frame++;

        if(frame % 30 === 0) spawnEnemy();
        if(frame % 50 === 0 && Math.random() < 0.4) spawnEnemy();

        for(let i=enemies.length-1; i>=0; i--) {
            let e = enemies[i];
            e.y += e.speed;

            if(e.y + e.radius > H) {
                lives--;
                livesEl.innerText = '❤️ ' + lives;
                SFX.tone(180, 0.25, 'sawtooth', 0.3, 60);
                enemies.splice(i, 1);
                if(lives <= 0) {
                    gameRunning = false;
                    SFX.noiseThud(0.35, 0.35);
                    finalMsg.innerText = kills;
                    gameOverDiv.style.display = 'block';
                    return;
                }
                continue;
            }
        }

        for(let t of towers) {
            if(t.cooldown > 0) { t.cooldown--; continue; }
            let nearest = null, nearestDist = Infinity;
            for(let e of enemies) {
                let dx = e.x - t.x, dy = e.y - t.y, dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < t.range && dist < nearestDist) { nearestDist = dist; nearest = e; }
            }
            if(nearest) {
                let dx = nearest.x - t.x, dy = nearest.y - t.y, dist = Math.sqrt(dx*dx + dy*dy);
                bullets.push({ x: t.x, y: t.y, vx: (dx/dist) * 5, vy: (dy/dist) * 5, radius: 4 });
                t.cooldown = t.fireRate;
                SFX.tone(700, 0.04, 'square', 0.1, 1000);
            }
        }

        for(let i=bullets.length-1; i>=0; i--) {
            let b = bullets[i];
            b.x += b.vx; b.y += b.vy;

            for(let j=enemies.length-1; j>=0; j--) {
                let e = enemies[j];
                let dx = b.x - e.x, dy = b.y - e.y;
                if(dx*dx + dy*dy < (b.radius + e.radius) * (b.radius + e.radius)) {
                    e.health--;
                    bullets.splice(i, 1);
                    if(e.health <= 0) {
                        kills++;
                        scoreEl.innerText = 'Kills: ' + kills;
                        SFX.tone(450, 0.08, 'sine', 0.25, 750);
                        enemies.splice(j, 1);
                    }
                    break;
                }
            }

            if(b.x < 0 || b.x > W || b.y < 0 || b.y > H) bullets.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#3a3f4b');
        bg.addColorStop(1, '#2d3436');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        for(let t of towers) {
            ctx.fillStyle = '#4facfe';
            ctx.shadowColor = '#4facfe';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#0f3460';
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.radius - 10, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(t.x - 4, t.y - 20, 8, 20);

            if(selectedTowerIndex !== -1 && towers.indexOf(t) === selectedTowerIndex) {
                ctx.strokeStyle = 'rgba(79, 172, 254, 0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.range, 0, Math.PI*2);
                ctx.stroke();
            }
        }

        for(let b of bullets) {
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = '#f1c40f';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        for(let e of enemies) {
            ctx.fillStyle = e.color;
            ctx.shadowColor = e.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(e.x - 4, e.y - 3, 3, 0, Math.PI*2);
            ctx.arc(e.x + 4, e.y - 3, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#2d3436';
            ctx.beginPath();
            ctx.arc(e.x - 4, e.y - 3, 1.5, 0, Math.PI*2);
            ctx.arc(e.x + 4, e.y - 3, 1.5, 0, Math.PI*2);
            ctx.fill();
            if(e.maxHealth > 1) {
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(e.x - 10, e.y - e.radius - 8, 20 * (e.health/e.maxHealth), 3);
            }
        }

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Tap anywhere to place towers. Defend the base!', W/2, H - 20);
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
