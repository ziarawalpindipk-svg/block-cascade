<script>
    /* ---------- Sound Manager (procedural, no external files) ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 70, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.12;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 130;
            const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 196;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let bird = { x: 60, y: 0, r: 15, vy: 0 };
    let gravity = 0.4;
    let jumpPower = -7;
    let pipes = [];
    let pipeGap = 160;
    let pipeWidth = 60;
    let pipeSpeed = 3;
    let score = 0;
    let gameRunning = false;
    let frame = 0;

    let clouds = [];
    for(let i=0; i<6; i++) {
        clouds.push({ x: Math.random()*600, y: 40 + Math.random()*150, s: 0.6 + Math.random()*0.8, speed: 0.3 + Math.random()*0.3 });
    }

    function resetGame() {
        bird.y = H/2;
        bird.vy = 0;
        pipes = [];
        score = 0;
        scoreEl.innerText = '0';
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        frame = 0;
    }

    function jump() {
        if(!gameRunning) return;
        bird.vy = jumpPower;
        SFX.tone(500, 0.1, 'square', 0.15, 750);
    }

    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });

    function update() {
        if(!gameRunning) return;

        bird.vy += gravity;
        bird.y += bird.vy;

        frame++;
        if(frame % 90 === 0) {
            let gapY = Math.random() * (H - 220) + 110;
            pipes.push({ x: W, gapY: gapY, scored: false, shade: Math.random() });
        }

        for(let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= pipeSpeed;

            if(!p.scored && bird.x > p.x + pipeWidth) {
                p.scored = true;
                score++;
                scoreEl.innerText = score;
                SFX.tone(800, 0.12, 'sine', 0.25);
            }

            if(bird.x + bird.r > p.x && bird.x - bird.r < p.x + pipeWidth) {
                if(bird.y - bird.r < p.gapY - pipeGap/2 || bird.y + bird.r > p.gapY + pipeGap/2) {
                    endGame();
                }
            }

            if(p.x + pipeWidth < 0) pipes.splice(i, 1);
        }

        if(bird.y - bird.r < 0 || bird.y + bird.r > H) {
            endGame();
        }
    }

    function endGame() {
        if(!gameRunning) return;
        gameRunning = false;
        SFX.noiseThud(0.35, 0.35);
        finalScoreEl.innerText = score;
        gameOverDiv.style.display = 'block';
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#2b3a67');
        grad.addColorStop(0.55, '#5c6f9e');
        grad.addColorStop(1, '#ff9a56');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        for(let c of clouds) {
            c.x -= c.speed;
            if(c.x < -60) c.x = W + 60;
            ctx.beginPath();
            ctx.ellipse(c.x, c.y, 28*c.s, 14*c.s, 0, 0, Math.PI*2);
            ctx.ellipse(c.x + 20*c.s, c.y + 4*c.s, 20*c.s, 11*c.s, 0, 0, Math.PI*2);
            ctx.ellipse(c.x - 18*c.s, c.y + 5*c.s, 18*c.s, 10*c.s, 0, 0, Math.PI*2);
            ctx.fill();
        }

        for(let p of pipes) {
            let topH = p.gapY - pipeGap/2;
            let botY = p.gapY + pipeGap/2;
            let botH = H - botY;
            let buildingColor = p.shade > 0.5 ? '#3a3f6b' : '#2e3358';

            ctx.fillStyle = buildingColor;
            ctx.fillRect(p.x, 0, pipeWidth, topH);
            ctx.fillStyle = 'rgba(255,220,120,0.55)';
            for(let wy = 15; wy < topH - 10; wy += 22) {
                for(let wx = 8; wx < pipeWidth - 12; wx += 18) {
                    if(Math.random() < 0.7) ctx.fillRect(p.x + wx, wy, 8, 10);
                }
            }
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(p.x - 4, topH - 8, pipeWidth + 8, 8);

            ctx.fillStyle = buildingColor;
            ctx.fillRect(p.x, botY, pipeWidth, botH);
            ctx.fillStyle = 'rgba(255,220,120,0.55)';
            for(let wy = botY + 15; wy < H - 10; wy += 22) {
                for(let wx = 8; wx < pipeWidth - 12; wx += 18) {
                    if(Math.random() < 0.7) ctx.fillRect(p.x + wx, wy, 8, 10);
                }
            }
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(p.x - 4, botY, pipeWidth + 8, 8);
        }

        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.rotate(Math.max(-0.4, Math.min(0.9, bird.vy * 0.06)));
        ctx.beginPath();
        ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffd166';
        ctx.shadowColor = '#ffd166';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#e08e0b';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.fillStyle = '#e08e0b';
        ctx.beginPath();
        ctx.ellipse(-3, 3, 8, 5, 0.3, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(6, -3, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(7.5, -3, 1.7, 0, Math.PI * 2);
        ctx.fillStyle = 'black';
        ctx.fill();
        ctx.fillStyle = '#ff6b35';
        ctx.beginPath();
        ctx.moveTo(bird.r - 2, 0);
        ctx.lineTo(bird.r + 8, -2);
        ctx.lineTo(bird.r - 2, 4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        resetGame();
    };
    restartBtn.onclick = resetGame;

    draw();
    loop();
</script>
