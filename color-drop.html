<script>
    /* ---------- Sound Manager ---------- */
    const SFX = (() => {
        let ctx = null, masterGain = null, musicGain = null, musicNodes = null;
        let lastVolume = 80, muted = false;
        function init() {
            if (ctx) return;
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = lastVolume / 100;
            masterGain.connect(ctx.destination);
            musicGain = ctx.createGain();
            musicGain.gain.value = 0.35;
            musicGain.connect(masterGain);
        }
        function setVolume(v) {
            lastVolume = v;
            if (ctx && !muted) masterGain.gain.value = v / 100;
        }
        function toggleMute() {
            if (!ctx) return muted;
            muted = !muted;
            masterGain.gain.value = muted ? 0 : lastVolume / 100;
            return muted;
        }
        function tone(freq, dur, type, vol, glideTo) {
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }
        function noiseThud(dur, vol) {
            if (!ctx) return;
            const bufferSize = ctx.sampleRate * dur;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            src.connect(g); g.connect(masterGain);
            src.start();
        }
        function startMusic() {
            if (!ctx || musicNodes) return;
            const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 130;
            const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 196;
            const lfo = ctx.createOscillator(); lfo.frequency.value = 0.09;
            const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
            o1.connect(musicGain); o2.connect(musicGain);
            o1.start(); o2.start(); lfo.start();
            musicNodes = [o1, o2, lfo];
        }
        return { init, setVolume, toggleMute, tone, noiseThud, startMusic };
    })();

    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    muteBtn.addEventListener('click', () => {
        const isMuted = SFX.toggleMute();
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
    });
    volumeSlider.addEventListener('input', (e) => {
        SFX.setVolume(Number(e.target.value));
        muteBtn.innerText = Number(e.target.value) === 0 ? '🔇' : '🔊';
    });

    /* ---------- Game ---------- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalMsg = document.getElementById('finalMsg');
    const gameOverDiv = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const introOverlay = document.getElementById('introOverlay');
    const startBtn = document.getElementById('startBtn');

    let W, H;
    function resize() {
        const c = document.getElementById('gameContainer');
        W = canvas.width = c.clientWidth;
        H = canvas.height = c.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let ball = { x: 0, y: 0, r: 15, color: '#ff6b6b' };
    let platforms = [];
    let score = 0;
    let gameRunning = false;
    let frame = 0;
    let speed = 3;

    const COLORS = ['#ff6b6b', '#4facfe', '#feca57', '#2ed573'];

    function initGame() {
        ball.x = W/2;
        ball.y = 0;
        ball.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        platforms = [];
        score = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        scoreEl.innerText = '0';
        frame = 0;
        speed = 3;
        generatePlatform();
    }

    function generatePlatform() {
        let y = platforms.length > 0 ? platforms[platforms.length-1].y - 120 : H - 50;
        let width = 80 + Math.random() * 100;
        let x = Math.random() * (W - width - 20) + 10;
        let color = COLORS[Math.floor(Math.random() * COLORS.length)];
        while(platforms.length > 0 && color === platforms[platforms.length-1].color) color = COLORS[Math.floor(Math.random() * COLORS.length)];
        platforms.push({ x, y, width, color });
    }

    function handleTap() {
        if(!gameRunning) return;
        let currentIndex = COLORS.indexOf(ball.color);
        ball.color = COLORS[(currentIndex + 1) % COLORS.length];
        SFX.tone(400, 0.05, 'sine', 0.18, 550);
    }

    canvas.addEventListener('mousedown', handleTap);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); }, { passive: false });

    function update() {
        if(!gameRunning) return;
        frame++;
        ball.y += speed;

        for(let i=platforms.length-1; i>=0; i--) {
            let p = platforms[i];
            if(ball.y + ball.r > p.y && ball.y + ball.r < p.y + 20) {
                if(ball.x + ball.r > p.x && ball.x - ball.r < p.x + p.width) {
                    if(ball.color === p.color) {
                        score++;
                        scoreEl.innerText = score;
                        SFX.tone(600, 0.1, 'sine', 0.3, 900);
                        ball.y = p.y - ball.r;
                        generatePlatform();
                        speed += 0.1;
                        let newColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                        while(newColor === ball.color) newColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                        ball.color = newColor;
                        break;
                    } else {
                        gameRunning = false;
                        SFX.noiseThud(0.3, 0.3);
                        finalMsg.innerText = score;
                        gameOverDiv.style.display = 'block';
                        return;
                    }
                }
            }
        }

        while(platforms.length > 0 && platforms[0].y > H + 50) platforms.shift();

        if(ball.y > H + 50) {
            gameRunning = false;
            SFX.noiseThud(0.3, 0.3);
            finalMsg.innerText = score;
            gameOverDiv.style.display = 'block';
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f3460');
        grad.addColorStop(1, '#1a5276');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        for(let p of platforms) {
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 15;
            let radius = 10;
            ctx.beginPath();
            ctx.moveTo(p.x + radius, p.y);
            ctx.lineTo(p.x + p.width - radius, p.y);
            ctx.quadraticCurveTo(p.x + p.width, p.y, p.x + p.width, p.y + radius);
            ctx.lineTo(p.x + p.width, p.y + 15);
            ctx.lineTo(p.x, p.y + 15);
            ctx.lineTo(p.x, p.y + radius);
            ctx.quadraticCurveTo(p.x, p.y, p.x + radius, p.y);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
        ctx.fillStyle = ball.color;
        ctx.shadowColor = ball.color;
        ctx.shadowBlur = 25;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        ctx.arc(ball.x - 4, ball.y - 4, 4, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Tap to change color. Match the platform!', W/2, H - 20);
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startBtn.onclick = () => {
        SFX.init();
        SFX.setVolume(Number(volumeSlider.value));
        SFX.startMusic();
        introOverlay.style.display = 'none';
        initGame();
    };
    restartBtn.onclick = initGame;

    draw();
    loop();
</script>
